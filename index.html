<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Creator Desk — controle seus jobs UGC</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#F3E7DD;
    --lilac:#FAF4ED;
    --magenta:#8E3B52;
    --magenta-deep:#6B2A3D;
    --magenta-tint:#F1E0E3;
    --rose:#C98FA0;
    --paper:#FFFFFF;
    --ink:#3A2B2A;
    --ink-soft:#8A746E;
    --ink-faint:#BBA89F;
    --line:#EBDFD3;
    --sage:#7DA88B;
    --sage-deep:#4E7A5C;
    --sage-tint:#E3EFE6;
    --amber:#C99A3E;
    --amber-deep:#9C7724;
    --amber-tint:#F6EDD8;
    --slate:#8C8AA8;
    --slate-tint:#EBEAF4;
    --danger:#A8434C;
    --danger-tint:#F2DCDD;
    --plum:#6F5A8C;
    --plum-tint:#EAE5F1;
    --clay:#B5673B;
    --clay-tint:#F4E4D8;
    --teal:#3E8E8A;
    --teal-tint:#DEEEED;
    --radius-s:8px;
    --radius-m:14px;
    --radius-l:20px;
    --shadow-soft:0 1px 2px rgba(58,43,42,0.04), 0 8px 24px -12px rgba(58,43,42,0.12);
  }
  html, body{height:100%;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--lilac);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  ::selection{background:var(--magenta-tint); color:var(--magenta-deep);}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:inherit;}

  /* ---- layout shell ---- */
  #app{display:flex; height:100vh; overflow:hidden;}

  .sidebar{
    width:248px;
    flex-shrink:0;
    background:var(--paper);
    border-right:1px solid var(--line);
    padding:28px 20px;
    display:flex;
    flex-direction:column;
    gap:28px;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:36px;height:36px;border-radius:10px;
    background:var(--magenta);
    display:flex;align-items:center;justify-content:center;
    color:#fff; font-family:'Fraunces',serif; font-weight:700; font-size:17px;
    flex-shrink:0;
    overflow:hidden;
    background-size:cover;
    background-position:center;
  }
  .brand-name{font-size:17px; font-weight:600;}
  .brand-sub{font-size:11px; color:var(--ink-faint); margin-top:1px;}

  .nav{display:flex; flex-direction:column; gap:2px;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:9px 12px;
    border-radius:var(--radius-s);
    font-size:14px; font-weight:500;
    color:var(--ink-soft);
    border:none; background:transparent;
    text-align:left; width:100%;
    transition:background .12s ease, color .12s ease;
  }
  .nav-item:hover{background:var(--lilac); color:var(--ink);}
  .nav-item.active{background:var(--magenta-tint); color:var(--magenta-deep);}
  .nav-item .ico{width:16px; text-align:center; font-size:14px;}

  .sidebar-foot{
    margin-top:auto;
    font-size:11.5px;
    color:var(--ink-faint);
    line-height:1.6;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
  .sync-dot{
    display:inline-block; width:7px; height:7px; border-radius:50%;
    margin-right:5px; vertical-align:middle; position:relative; top:-1px;
  }
  .sync-dot.ok{background:var(--sage);}
  .sync-dot.pending{background:var(--amber);}
  .sync-dot.off{background:var(--ink-faint);}
  #syncUserEmail{font-size:11px; color:var(--ink-soft); margin-top:4px; word-break:break-all;}
  #btnCloudAuth{width:100%; justify-content:center; margin-top:10px; font-size:12.5px;}

  .main{flex:1; min-width:0; padding:36px 44px 60px; height:100vh; overflow-y:auto;}
  .page-head{
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom:24px; gap:16px; flex-wrap:wrap;
  }
  .page-head h1{font-size:26px; margin:0 0 4px;}
  .page-sub{color:var(--ink-soft); font-size:14px; margin:0;}

  .btn{
    display:inline-flex; align-items:center; gap:7px;
    padding:10px 16px;
    border-radius:var(--radius-s);
    border:1px solid var(--line);
    background:var(--paper);
    font-size:13.5px; font-weight:600;
    color:var(--ink);
    transition:transform .08s ease, background .12s ease, border-color .12s ease;
    white-space:nowrap;
  }
  .btn:hover{background:var(--lilac);}
  .btn:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--magenta); border-color:var(--magenta); color:#fff;
  }
  .btn-primary:hover{background:var(--magenta-deep); border-color:var(--magenta-deep);}
  .btn-ghost{border-color:transparent; background:transparent;}
  .btn-ghost:hover{background:var(--lilac);}
  .btn-sm{padding:6px 11px; font-size:12.5px; border-radius:7px;}
  .btn-danger-text{color:var(--danger); border-color:var(--danger-tint); background:var(--danger-tint);}
  .btn-danger-text:hover{background:#ecc4cb;}

  /* ---- metric cards ---- */
  .metrics{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(190px,1fr));
    gap:14px; margin-bottom:32px;
  }
  .metric-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-l);
    padding:18px 20px; box-shadow:var(--shadow-soft);
  }
  .metric-label{font-size:12px; color:var(--ink-soft); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin:0 0 8px;}
  .metric-value{font-family:'Fraunces',serif; font-size:26px; font-weight:600; margin:0; color:var(--ink);}
  .metric-value.coral{color:var(--magenta-deep);}
  .metric-value.sage{color:var(--sage-deep);}
  .metric-value.amber{color:var(--amber-deep);}
  .metric-foot{font-size:12px; color:var(--ink-faint); margin-top:6px;}

  /* ---- section ---- */
  .section{margin-bottom:36px;}
  .section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .section-head h2{font-size:18px; margin:0;}

  /* ---- pill filters (platform tabs) ---- */
  .pill-tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:22px;}
  .pill-tab{
    padding:8px 16px; border-radius:999px; border:1px solid var(--line);
    background:var(--paper); font-size:13px; font-weight:600; color:var(--ink-soft);
  }
  .pill-tab:hover{background:var(--lilac);}
  .pill-tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  /* ---- kanban ---- */
  .kanban{display:flex; gap:16px; overflow-x:auto; padding-bottom:8px; align-items:flex-start; height:calc(100vh - 270px); min-height:340px;}
  .kanban-col{
    flex:0 0 270px; width:270px;
    display:flex; flex-direction:column; height:100%;
  }
  .kanban-col-head{display:flex; align-items:baseline; gap:6px; margin-bottom:12px; padding:0 2px; flex-shrink:0;}
  .kanban-col-title{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);}
  .kanban-col-count{font-size:11.5px; color:var(--ink-faint);}
  .kanban-col-body{
    display:flex; flex-direction:column; gap:10px;
    background:rgba(255,255,255,0.5);
    border:1.5px dashed var(--line); border-radius:var(--radius-m);
    padding:10px; min-height:90px;
    flex:1; overflow-y:auto;
    transition:background .12s ease, border-color .12s ease;
  }
  .kanban-col-body.drag-over{background:var(--magenta-tint); border-color:var(--magenta);}
  .kanban-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-m);
    padding:14px 14px; box-shadow:var(--shadow-soft);
    cursor:grab; transition:border-color .12s ease, opacity .12s ease, transform .12s ease;
  }
  .kanban-card:hover{border-color:var(--magenta);}
  .kanban-card.dragging{opacity:0.4; transform:scale(0.97);}
  .kanban-card-title{font-size:15px; font-weight:600; margin:0 0 8px; font-family:'Fraunces',serif;}
  .kanban-tags{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .tag{
    display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px;
    font-size:11px; font-weight:600; white-space:nowrap;
  }
  .tag-platform{background:var(--slate-tint); color:#54527a; display:inline-flex; align-items:center; gap:5px;}
  .tag-value{font-size:12.5px; font-weight:700; color:var(--ink);}
  .tag-deadline{background:var(--danger-tint); color:var(--danger);}
  .status-dot{display:inline-block; width:6px; height:6px; border-radius:50%; flex-shrink:0;}
  .status-badge{
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 9px; border-radius:999px;
    font-size:11px; font-weight:600; white-space:nowrap;
  }
  .kanban-col-head .status-badge{padding:2px 8px;}
  .kanban-add{
    border:none; background:transparent; color:var(--ink-faint); font-size:13px;
    text-align:left; padding:6px 4px; font-weight:500; flex-shrink:0;
  }
  .kanban-add:hover{color:var(--magenta-deep);}

  .empty{
    text-align:center; padding:50px 20px;
    color:var(--ink-faint); font-size:14px;
    border:1.5px dashed var(--line); border-radius:var(--radius-l);
    background:var(--paper);
  }
  .empty .ico-big{font-size:26px; margin-bottom:10px; display:block;}

  /* ---- table ---- */
  .table-wrap{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-l); overflow:hidden; box-shadow:var(--shadow-soft);}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left; padding:12px 16px; font-size:11.5px; font-weight:600;
    color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em;
    background:var(--lilac); border-bottom:1px solid var(--line);
  }
  td{padding:14px 16px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.row-clickable:hover{background:var(--lilac);}
  .name-cell{font-weight:600; font-family:'Fraunces',serif; font-size:14.5px;}

  /* ---- modal ---- */
  .overlay{
    position:fixed; inset:0; background:rgba(53,43,54,0.38);
    display:flex; align-items:center; justify-content:center; padding:24px;
    z-index:50; overflow-y:auto;
  }
  .modal{
    background:var(--paper); border-radius:var(--radius-l);
    width:100%; max-width:520px; max-height:88vh; overflow-y:auto;
    padding:28px 28px 24px; box-shadow:0 24px 60px -16px rgba(53,43,54,0.4);
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .modal-head h2{font-size:19px; margin:0;}
  .modal-close{
    width:30px; height:30px; border-radius:50%; border:none; background:var(--lilac);
    display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:15px;
  }
  .modal-close:hover{background:var(--line);}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border-radius:var(--radius-s);
    border:1px solid var(--line); background:var(--lilac); color:var(--ink);
    font-size:14px; outline:none; transition:border-color .12s ease, background .12s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    border-color:var(--magenta); background:var(--paper);
  }
  .field textarea{resize:vertical; min-height:64px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .field-row-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:22px; flex-wrap:wrap;}

  .detail-funnel{display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 18px;}
  .detail-step{
    padding:6px 10px; border-radius:7px; font-size:11.5px; font-weight:600;
    background:var(--lilac); color:var(--ink-faint); border:1px solid transparent;
  }
  .detail-step.active{background:var(--magenta); color:#fff;}
  .detail-step.past{background:var(--magenta-tint); color:var(--magenta-deep);}
  .detail-step.paid{background:var(--sage); color:#fff;}
  .detail-step.cancelled{background:var(--danger); color:#fff;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px;
    font-size:13.5px; font-weight:500; opacity:0; pointer-events:none;
    transition:opacity .2s ease, transform .2s ease; z-index:100;
    box-shadow:0 12px 30px -8px rgba(0,0,0,0.4);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .sr-only{position:absolute; width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

  /* ---- agenda (intelligent calendar) ---- */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .cal-nav{display:flex; align-items:center; gap:10px;}
  .cal-title{font-size:18px; min-width:170px; text-align:center;}
  .agenda-filters{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
  .agenda-filter-chip{
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--line); background:var(--paper); border-radius:999px;
    padding:4px 10px 4px 8px; font-size:11.5px; font-weight:500; color:var(--ink-faint);
    transition:all .12s ease; opacity:0.55;
  }
  .agenda-filter-chip.active{opacity:1; color:var(--ink); border-color:var(--rose); background:var(--lilac);}
  .agenda-filter-chip:hover{opacity:1;}
  .cal-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
  }
  .cal-dow{font-size:11px; font-weight:700; text-transform:uppercase; color:var(--ink-faint); text-align:center; padding-bottom:6px; letter-spacing:.04em;}
  .cal-cell{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-s);
    min-height:96px; padding:7px; display:flex; flex-direction:column; gap:4px;
  }
  .cal-cell.empty-cell{background:transparent; border:none;}
  .cal-cell.today{border-color:var(--magenta); border-width:1.5px;}
  .cal-daynum{font-size:12.5px; font-weight:600; color:var(--ink-soft);}
  .cal-cell.today .cal-daynum{color:var(--magenta-deep);}
  .cal-job-chip{
    font-size:10.5px; font-weight:600; padding:2px 6px; border-radius:5px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer;
  }

  /* ---- checklist (infinite week scroller) ---- */
  .week-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;}
  .week-nav{display:flex; align-items:center; gap:10px;}
  .week-title{font-size:16px; min-width:170px; text-align:center;}

  /* Outer viewport: clips the scrollbar so navigation feels infinite, not "scrolled" */
  .week-scroll-viewport{
    margin:0 -4px; padding:0 4px;
    overflow:hidden;
  }
  .week-kanban{
    display:flex; gap:16px; align-items:stretch;
    overflow-x:auto; overflow-y:hidden;
    padding:4px 4px 22px; margin-bottom:-18px; /* hide native scrollbar below the fold */
    scroll-behavior:smooth;
    scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;
  }
  .week-kanban::-webkit-scrollbar{height:0; display:none;}
  .week-kanban{scrollbar-width:none; -ms-overflow-style:none;}

  .week-col{
    flex:1 1 0; min-width:172px; max-width:240px;
    scroll-snap-align:start;
    display:flex; flex-direction:column;
    animation:weekColIn .22s ease both;
  }
  @keyframes weekColIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .week-col-head{margin-bottom:12px; padding:0 3px;}
  .week-col-dow{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}
  .week-col-date{font-size:14px; font-weight:600; color:var(--ink); margin-top:1px;}
  .week-col.is-today .week-col-dow{color:var(--magenta-deep);}
  .week-col.is-today .week-col-date{color:var(--magenta-deep);}
  .week-col.is-today .week-col-head{position:relative;}
  .week-col.is-today .week-col-head::after{
    content:""; position:absolute; left:3px; bottom:-6px; width:16px; height:2.5px;
    border-radius:2px; background:var(--magenta);
  }
  .week-col-body{
    background:rgba(255,255,255,0.45); border:1.5px dashed var(--line); border-radius:var(--radius-m);
    padding:12px; min-height:160px; flex:1;
    display:flex; flex-direction:column; gap:16px;
    transition:background .15s ease, border-color .15s ease;
  }
  .week-col-body.drag-over{background:var(--magenta-tint); border-color:var(--magenta); border-style:solid;}
  .week-cat-label{
    font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-faint); margin:2px 0 8px 2px;
  }
  .week-cat-label.cat-work{color:var(--magenta-deep);}
  .week-cat-label.cat-personal{color:var(--sage-deep);}
  .check-list{display:flex; flex-direction:column; gap:7px;}
  .check-item{
    display:flex; align-items:flex-start; gap:9px;
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-s);
    padding:10px 11px; box-shadow:var(--shadow-soft);
    cursor:grab;
    transition:border-color .12s ease, opacity .12s ease, transform .12s ease, box-shadow .12s ease;
  }
  .check-item:hover{border-color:var(--rose);}
  .check-item.dragging{opacity:0.4; transform:scale(0.96);}
  .check-item.auto-deadline{border-color:var(--amber-tint); background:var(--amber-tint);}
  .check-item.auto-deadline:hover{border-color:var(--amber);}
  .check-item.auto-deadline .check-text{font-weight:500;}
  .check-auto-tag{
    display:inline-flex; align-items:center; font-size:9.5px; font-weight:700;
    text-transform:uppercase; letter-spacing:.04em; color:var(--amber-deep);
    background:#fff; border:1px solid var(--amber); border-radius:5px;
    padding:1.5px 5px; margin-top:2px; flex-shrink:0;
  }
  .check-box{

STATUS_FLOW.forEach(function(s,i){ STATUS_INDEX[s.key] = i; });
var KANBAN_STATUSES = STATUS_FLOW.concat([{key:STATUS_CANCELLED,label:"Cancelado"}]);

/* Status color map: each status gets a dot color + soft tint background,

var STATUS_COLORS = {

function statusBadgeHtml(key, label){

  '</span>';

/* Platform colors: deterministic hash of the platform name into a small rotating
   palette, so the same platform always gets the same color across sessions/devices. */
var PLATFORM_PALETTE = [
  {dot:'var(--magenta)',  bg:'var(--magenta-tint)', fg:'var(--magenta-deep)'},
  {dot:'var(--sage)',     bg:'var(--sage-tint)',    fg:'var(--sage-deep)'},

  {dot:'var(--danger)',   bg:'var(--danger-tint)',  fg:'var(--danger)'}
];
function hashStringToIndex(str, mod){
  var h = 0;
  for(var i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h % mod;
}
function platformColor(platformIdOrName){
  var key = String(platformIdOrName||'');
  return PLATFORM_PALETTE[hashStringToIndex(key, PLATFORM_PALETTE.length)];
}
function platformBadgeHtml(platform){

  var c = platformColor(platform.id);
  return '<span class="tag tag-platform" style="background:'+c.bg+'; color:'+c.fg+';">' +
    '<span class="status-dot" style="background:'+c.dot+';"></span>' + escapeHtml(platform.name) +

}

var CONTENT_TYPES = ["Vídeo UGC","Foto UGC","Vídeo + Foto","Stories","Reels","Outro"];

];

var FIREBASE_CONFIG = {

  projectId: "creator-desk-f6a80",
  storageBucket: "creator-desk-f6a80.firebasestorage.app",
  messagingSenderId: "892382408049",
  appId: "1:892382408049:web:db7d1c5fb6949428d31ad0",
  measurementId: "G-3PJ7F33JXD"
};

var cloudUser = null;
var cloudDb = null;
var cloudUnsubscribe = null;
var cloudSaveTimer = null;
var cloudSyncStatus = "off";
var applyingRemote = false;

/* ---------------- storage helpers ---------------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function ensureArray(val){
  if(Array.isArray(val)) return val;
  if(val && typeof val === 'object') return [val];
  return [];
}

var storageAdapter = (function(){
  var lsAvailable = false;
  try{
    localStorage.setItem('__ugc_test__', '1');
    localStorage.removeItem('__ugc_test__');
    lsAvailable = true;
  }catch(e){ lsAvailable = false; }

  function lsGet(key){
    if(!lsAvailable) return null;
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  function lsSet(key, val){
    if(!lsAvailable) return Promise.reject(new Error('localStorage unavailable neste navegador'));
    try{ localStorage.setItem(key, val); return Promise.resolve(); }catch(e){ return Promise.reject(e); }
  }
  // O Creator Desk roda como site publicado (Vercel) e persiste localmente via
  // localStorage, com Firestore por cima para sincronizar entre dispositivos.
  // Nunca usar window.storage aqui: essa API só existe no preview de artifacts
  // do Claude e nunca estará disponível no site real — usá-la faria todo
  // salvamento (despesas, jobs, tudo) falhar silenciosamente em produção.
  return {
    get: function(key){ return Promise.resolve({ value: lsGet(key) }); },
    set: lsSet
  };
})();

var saveQueue = Promise.resolve();

async function loadKey(key){
  try{
    var r = await storageAdapter.get(key, false);
    var raw = r && r.value != null && r.value !== '' ? r.value : null;
    if(!raw) return [];
    return ensureArray(JSON.parse(raw));
  }catch(e){ return []; }
}
async function loadKeyObj(key){
  try{
    var r = await storageAdapter.get(key, false);
    var raw = r && r.value != null && r.value !== '' ? r.value : null;
    if(!raw) return null;
    var parsed = JSON.parse(raw);
    return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
  }catch(e){ return null; }
}
function saveKey(key, val){
  var payload = JSON.stringify(val);
  // Grava localmente de imediato — essa é a operação que precisa ter sucesso
  // ou falha visíveis na hora (é o que faz "criar despesa" funcionar ou não).
  // A sincronização com a nuvem roda à parte, sem travar nem ser travada por ela.
  var localSave = storageAdapter.set(key, payload, false).catch(function(err){
    showToast("Não foi possível salvar neste navegador. Tente novamente.");
    throw err;
  });
  saveQueue = saveQueue.then(function(){ return localSave; }).catch(function(){ /* já avisado acima */ });
  return localSave.then(function(){
    if(!applyingRemote) scheduleCloudSync();
  });
}
function saveKeyQuiet(key, val){
  return storageAdapter.set(key, JSON.stringify(val), false);
}
function isCloudConfigured(){
  return FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId &&
    FIREBASE_CONFIG.apiKey.indexOf("COLOQUE") === -1;
}
function hasLocalData(){
  return state.jobs.length > 0 || state.brands.length > 0 || state.prospects.length > 0 ||
    state.checklist.length > 0 || state.expenses.length > 0 || state.products.length > 0 || !!state.contractProfile;
}
function setCloudSyncStatus(status, text){
  cloudSyncStatus = status;
  var el = document.getElementById('syncStatusText');
  if(!el) return;
  el.innerHTML = '<span class="sync-dot '+status+'"></span>' + escapeHtml(text);
}
function updateSyncUI(){
  var btn = document.getElementById('btnCloudAuth');
  var emailEl = document.getElementById('syncUserEmail');
  if(!btn || !emailEl) return;

  if(!isCloudConfigured()){
    setCloudSyncStatus('off', 'Salvo neste navegador. Configure Firebase para sincronizar entre dispositivos.');
    btn.style.display = 'none';
    emailEl.style.display = 'none';
    return;
  }

  btn.style.display = 'inline-flex';
  if(cloudUser){
    emailEl.style.display = 'block';
    emailEl.textContent = cloudUser.email || 'Conta conectada';
    btn.textContent = 'Sair';
    if(cloudSyncStatus === 'pending'){
      setCloudSyncStatus('pending', 'Salvando na nuvem...');
    } else {
      setCloudSyncStatus('ok', 'Sincronizado em todos os dispositivos');
    }
  } else {
    emailEl.style.display = 'none';
    btn.textContent = 'Entrar com Google';
    setCloudSyncStatus('off', 'Entre para sincronizar entre celular e computador');
  }
}
function setupCloudAuthUI(){
  var btn = document.getElementById('btnCloudAuth');
  if(!btn) return;
  btn.addEventListener('click', function(){
    if(!isCloudConfigured()){
      showToast('Configure o Firebase no arquivo antes de usar a nuvem.');
      return;
    }
    if(cloudUser){
      firebase.auth().signOut().catch(function(){
        showToast('Não foi possível sair. Tente novamente.');
      });
      return;
    }
    setCloudSyncStatus('pending', 'Abrindo login...');
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(function(err){
      if(err && err.code === 'auth/popup-closed-by-user'){
        updateSyncUI();
        return;
      }
      showToast('Erro ao entrar: ' + ((err && err.message) ? err.message : 'tente novamente'));
      updateSyncUI();
    });
  });
}
function getCloudDocRef(){
  if(!cloudUser || !cloudDb) return null;
  return cloudDb.collection('users').doc(cloudUser.uid).collection('data').doc('main');
}
function getStatePayload(){
  return {
    jobs: state.jobs,
    brands: state.brands,
    platforms: state.platforms,
    checklist: state.checklist,
    expenses: state.expenses,
    prospects: state.prospects,
    products: state.products,
    contractProfile: state.contractProfile,
    notificationsRead: state.notificationsRead,
    exchangeRates: state.exchangeRates,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
}
function scheduleCloudSync(){
  if(!cloudUser || !cloudDb || applyingRemote) return;
  clearTimeout(cloudSaveTimer);
  setCloudSyncStatus('pending', 'Salvando na nuvem...');
  cloudSaveTimer = setTimeout(function(){ pushAllToCloud(); }, 700);
}
function pushAllToCloud(){
  var ref = getCloudDocRef();
  if(!ref) return Promise.resolve();
  return ref.set(getStatePayload(), {merge: true}).then(function(){
    updateSyncUI();
  }).catch(function(){
    setCloudSyncStatus('off', 'Falha ao sincronizar. Dados salvos neste navegador.');
    showToast('Falha ao sincronizar na nuvem.');
  });
}
function persistAllLocalQuiet(){
  applyingRemote = true;
  return Promise.all([
    saveKeyQuiet(STORE.jobs, state.jobs),
    saveKeyQuiet(STORE.brands, state.brands),
    saveKeyQuiet(STORE.platforms, state.platforms),
    saveKeyQuiet(STORE.checklist, state.checklist),
    saveKeyQuiet(STORE.expenses, state.expenses),
    saveKeyQuiet(STORE.prospects, state.prospects),
    saveKeyQuiet(STORE.products, state.products),
    saveKeyQuiet(STORE.contractProfile, state.contractProfile),
    saveKeyQuiet(STORE.notificationsRead, state.notificationsRead),
    saveKeyQuiet(STORE.exchangeRates, state.exchangeRates)
  ]).finally(function(){ applyingRemote = false; });
}
function applyRemoteData(data){
  if(!data) return;
  // Se os dados remotos chegaram completamente vazios mas temos dados locais,
  // ignoramos o update — pode ser um sync incompleto ou documento novo no Firestore.
  var remoteHasData = (data.jobs && data.jobs.length > 0) ||
    (data.brands && data.brands.length > 0) ||
    (data.prospects && data.prospects.length > 0) ||
    (data.checklist && data.checklist.length > 0) ||
    (data.expenses && data.expenses.length > 0) ||
    (data.products && data.products.length > 0);
  if(!remoteHasData && hasLocalData()) return;

  applyingRemote = true;
  state.jobs = ensureArray(data.jobs);
  state.brands = ensureArray(data.brands);
  state.platforms = ensureArray(data.platforms);
  state.checklist = ensureArray(data.checklist);
  state.expenses = ensureArray(data.expenses);
  state.prospects = ensureArray(data.prospects);
  state.products = ensureArray(data.products);
  state.contractProfile = data.contractProfile && typeof data.contractProfile === 'object' && !Array.isArray(data.contractProfile)
    ? data.contractProfile : null;
  state.notificationsRead = data.notificationsRead && typeof data.notificationsRead === 'object' && !Array.isArray(data.notificationsRead)
    ? data.notificationsRead : {};
  state.exchangeRates = data.exchangeRates && typeof data.exchangeRates === 'object' && !Array.isArray(data.exchangeRates)
    ? Object.assign({BRL:1}, data.exchangeRates) : state.exchangeRates;
  applyingRemote = false;
}
function subscribeCloudData(){
  if(cloudUnsubscribe){ cloudUnsubscribe(); cloudUnsubscribe = null; }
  var ref = getCloudDocRef();
  if(!ref) return;

  cloudUnsubscribe = ref.onSnapshot(function(snap){
    if(snap.metadata.hasPendingWrites) return;

    if(!snap.exists){
      if(hasLocalData()){
        pushAllToCloud();
      }
      updateSyncUI();
      return;
    }

    applyRemoteData(snap.data());
    persistAllLocalQuiet().then(function(){
      if(state.loaded){
        document.getElementById('modalRoot').innerHTML = '';
        render();
      }
      updateSyncUI();
    });
  }, function(){
    setCloudSyncStatus('off', 'Sem conexão. Usando cópia local.');
  });
}
function initCloudSync(){
  if(!isCloudConfigured() || typeof firebase === 'undefined'){
    updateSyncUI();
    return Promise.resolve();
  }

  if(!firebase.apps.length){
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  cloudDb = firebase.firestore();

  return new Promise(function(resolve){
    var ready = false;
    firebase.auth().onAuthStateChanged(function(user){
      cloudUser = user;
      if(cloudUnsubscribe){ cloudUnsubscribe(); cloudUnsubscribe = null; }

      if(user){
        subscribeCloudData();
      } else {
        updateSyncUI();
      }
      if(!ready){
        ready = true;
        resolve();
      }
    });
  });
}

  var loadedRates = await loadKeyObj(STORE.exchangeRates);
  if(loadedRates) state.exchangeRates = Object.assign({BRL:1}, loadedRates);
  if(state.platforms.length===0){
    var defaults = ["Destrava UGC","Seu Influencer","Mis","BrandLovers","Noovid","Squid","Wake Creators","Influency.me","Spark","Unfy","Axis","Space","Prospecção ativa","Inbound","Outros"];
    state.platforms = defaults.map(function(n){ return {id:uid(), name:n, createdAt:Date.now()}; });
    await saveKey(STORE.platforms, state.platforms);

    var changed = false;

/* ---------------- utils ---------------- */
function escapeHtml(str){
  if(str===undefined||str===null) return "";
  return String(str).replace(/[&<>"']/g, function(c){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
  });
}
function fmtDate(iso){
  if(!iso) return "—";
  var d = new Date(iso+"T00:00:00");
  if(isNaN(d.getTime())) return "—";
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
}
function daysUntil(iso){
  if(!iso) return null;
  var d = new Date(iso+"T00:00:00");
  if(isNaN(d.getTime())) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}
function brandById(id){ return state.brands.find(function(b){return b.id===id;}); }
function platformById(id){ return state.platforms.find(function(p){return p.id===id;}); }
function statusLabel(key){
  if(key===STATUS_CANCELLED) return "Cancelado";
  var s = STATUS_FLOW.find(function(x){return x.key===key;});
  return s ? s.label : key;
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}
function parseMoneyGuess(v){
  if(!v) return 0;
  var cleaned = String(v).replace(/[^\d,.\-]/g,'').replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.');
  var n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}
function fmtBRL(n){
  try{ return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
  catch(e){ return 'R$ ' + n.toFixed(2); }
}
function fmtCurrency(n, currencyCode){
  currencyCode = currencyCode || 'BRL';
  try{ return n.toLocaleString('pt-BR',{style:'currency',currency:currencyCode}); }
  catch(e){
    var c = CURRENCIES.find(function(c){return c.code===currencyCode;});
    return (c?c.symbol:'R$') + ' ' + n.toFixed(2);
  }
}

/* Converts any tracked currency to BRL using the user-configured exchange rates,
   so totals across the app (Dashboard, Pagamentos, Métricas) can sum mixed-currency
   jobs into one meaningful number. Individual job cards still display the original
   currency — only aggregates go through this. */
function parseMoneyBRL(value, currencyCode){
  var amount = parseMoneyGuess(value);
  if(!amount) return 0;
  var code = currencyCode || 'BRL';
  var rate = (state.exchangeRates && state.exchangeRates[code]) || (code==='BRL' ? 1 : 1);
  return amount * rate;
}

/* ---------------- installments helpers ---------------- */
function jobTotalValue(job){
  if(job.paymentType==='split' && job.installments && job.installments.length>0){
    return job.installments.reduce(function(s,inst){ return s+parseMoneyBRL(inst.value, job.currency); }, 0);
  }
  return parseMoneyBRL(job.value, job.currency);
}
function jobPaidValue(job){
  if(job.paymentType==='split' && job.installments && job.installments.length>0){
    return job.installments.filter(function(i){return i.paid;}).reduce(function(s,inst){ return s+parseMoneyBRL(inst.value, job.currency); }, 0);
  }
  return job.status==='pago' ? parseMoneyBRL(job.value, job.currency) : 0;
}
function jobPendingValue(job){
  return jobTotalValue(job) - jobPaidValue(job);
}
function buildInstallments(splitMode, totalValue, videoCount, customRows){
  var total = parseMoneyGuess(totalValue);
  if(splitMode==='half'){
    var half = (total/2);
    return [
      {id:uid(), label:'Entrada (50%)', value: half.toFixed(2), dueDate:'', paid:false, paidDate:''},
      {id:uid(), label:'Final (50%)', value: (total-half).toFixed(2), dueDate:'', paid:false, paidDate:''}
    ];
  }
  if(splitMode==='per_video'){
    var n = Math.max(1, parseInt(videoCount,10) || 1);
    var per = total/n;
    var rows = [];
    for(var i=0;i<n;i++){
      rows.push({id:uid(), label:'Vídeo '+(i+1), value: per.toFixed(2), dueDate:'', paid:false, paidDate:''});
    }
    return rows;
  }
  if(splitMode==='custom' && customRows){
    return customRows;
  }
  return [];
}

function renderProspectKanban(){

  });

    card.addEventListener('click', function(){
      if(card.classList.contains('dragging')) return;
      openProspectModal(card.getAttribute('data-prospect-id'));
    });
    card.addEventListener('dragstart', function(e){
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.getAttribute('data-prospect-id'));
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function(){ card.classList.remove('dragging'); });
  });
  wrap.querySelectorAll('[data-new-prospect-status]').forEach(function(btn){
    btn.addEventListener('click', function(){ openProspectModal(null, btn.getAttribute('data-new-prospect-status')); });
  });
  wrap.querySelectorAll('[data-prospect-col]').forEach(function(col){
    col.addEventListener('dragover', function(e){ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', function(){ col.classList.remove('drag-over'); });
    col.addEventListener('drop', function(e){
      e.preventDefault();
      col.classList.remove('drag-over');

      var newStatus = col.getAttribute('data-prospect-col');
      var p = state.prospects.find(function(x){ return x.id===pId; });
      if(p && p.status!==newStatus){
        moveProspectToStatus(p, newStatus);
      }
    });
  });

/* Finds a brand by case-insensitive name match, or creates one. Never creates duplicates.
   Shared by prospect→job conversion and the job form's brand autocomplete. */
function findOrCreateBrandByName(rawName, extra){
  var name = (rawName || '').trim();
  if(!name) return null;
  var existing = state.brands.find(function(b){ return b.name.trim().toLowerCase()===name.toLowerCase(); });
  if(existing) return existing;
  extra = extra || {};
  var brand = {
    id: uid(),
    name: name,
    contact: extra.contact || '',
    notes: extra.notes || 'Criada automaticamente ao cadastrar um trabalho.',
    createdAt: Date.now()
  };
  state.brands.push(brand);
  saveBrands();
  return brand;
}

function convertProspectToJob(p){
  // find or create a brand with this name
  var brand = findOrCreateBrandByName(p.brandName, {contact:p.contact||'', notes:'Criada automaticamente a partir da prospecção.'});
  var alreadyExists = state.jobs.some(function(j){ return j.prospectId===p.id; });
  if(alreadyExists) return;
  state.jobs.push({
    id: uid(),
    title: p.brandName,
    brandId: brand.id,
    platformId: p.platformId || '',
    status: 'contrato',
    contentType: '',
    videoCount: null,
    photoCount: null,
    deadline: '',
    payDate: '',
    paymentMethod: '',
    value: '',
    notes: p.notes || '',
    prospectId: p.id,
    createdAt: Date.now()
  });
  saveJobs();
}

        '</div>' +
        '<div class="field"><label for="pStatus">Status</label><select id="pStatus">'+statusOptions+'</select></div>' +
        '<div class="field"><label for="pNotes">Notas</label><textarea id="pNotes" placeholder="Histórico da conversa, valor proposto...">'+escapeHtml(p?p.notes:'')+'</textarea></div>' +
        '<div class="modal-actions">' +
          (isNew ? '' : '<button class="btn btn-danger-text" id="pDelete" style="margin-right:auto;">excluir</button>') +
          '<button class="btn btn-ghost" id="pCancel">cancelar</button>' +
          '<button class="btn btn-primary" id="pSave">'+(isNew?'Criar prospecção':'Salvar alterações')+'</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('pBrandName').focus();

  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('prospModalClose').addEventListener('click', close);
  document.getElementById('pCancel').addEventListener('click', close);
  document.getElementById('prospOverlay').addEventListener('click', function(e){ if(e.target.id==='prospOverlay') close(); });

  if(!isNew){
    document.getElementById('pDelete').addEventListener('click', function(){
      if(confirm('Excluir esta prospecção?')){
        state.prospects = state.prospects.filter(function(x){ return x.id!==p.id; });
        saveProspects(); close(); showToast('Prospecção excluída.'); render();
      }
    });
  }

  document.getElementById('pSave').addEventListener('click', function(){
    var brandName = document.getElementById('pBrandName').value.trim();
    if(!brandName){ showToast('Dá um nome pra marca.'); return; }
    var newStatus = document.getElementById('pStatus').value;
    var data = {
      brandName: brandName,
      contact: document.getElementById('pContact').value.trim(),
      platformId: document.getElementById('pPlatform').value,
      notes: document.getElementById('pNotes').value.trim()
    };
    if(isNew){
      data.id = uid();
      data.status = newStatus;
      data.createdAt = Date.now();
      state.prospects.push(data);
      saveProspects();
      close();
      if(newStatus==='fechou'){ convertProspectToJob(data); showToast('Prospecção criada e trabalho gerado.'); }
      else showToast('Prospecção criada.');
      render();
    } else {
      var statusChanged = p.status!==newStatus;
      Object.assign(p, data);
      saveProspects();
      close();
      if(statusChanged && newStatus==='fechou'){
        convertProspectToJob(p);
        showToast('Prospecção fechada — trabalho criado.');
      } else {
        showToast('Alterações salvas.');
      }
      render();
    }
  });
}

    document.getElementById('btnEmptyNewJob').addEventListener('click', function(){ openJobModal(null); });
    return;
  }

  html += '<div class="kanban" id="kanbanWrap"></div>';
  document.getElementById('pageContent').innerHTML = html;

  document.getElementById('btnNewJob').addEventListener('click', function(){ openJobModal(null); });
  document.getElementById('platformTabs').addEventListener('click', function(e){
    var btn = e.target.closest('.pill-tab');
    if(!btn) return;
    state.jobFilterPlatform = btn.getAttribute('data-plat');
    renderJobs();
  });
  renderKanban();
}

function renderKanban(){
  var jobs = state.jobs.filter(function(j){
    return !state.jobFilterPlatform || j.platformId===state.jobFilterPlatform;
  });
  var wrap = document.getElementById('kanbanWrap');
  if(!wrap) return;

  // Preserva posição de scroll horizontal antes de re-renderizar
  var prevScrollLeft = wrap.scrollLeft;

  var html = '';
  KANBAN_STATUSES.forEach(function(s){
    var colJobs = jobs.filter(function(j){ return j.status===s.key; });
    html += '<div class="kanban-col">' +
      '<div class="kanban-col-head">'+statusBadgeHtml(s.key, s.label)+'<span class="kanban-col-count">('+colJobs.length+')</span></div>' +
      '<div class="kanban-col-body" data-status-col="'+s.key+'">';
    colJobs.forEach(function(j){ html += kanbanCardHtml(j); });
    html += '<button class="kanban-add" data-new-job-status="'+s.key+'">+ Adicionar</button>';
    html += '</div></div>';
  });
  wrap.innerHTML = html;

  // Restaura posição de scroll horizontal
  if(prevScrollLeft) wrap.scrollLeft = prevScrollLeft;

  wrap.querySelectorAll('.kanban-card').forEach(function(card){
    card.addEventListener('click', function(e){
      if(card.classList.contains('dragging')) return;
      openJobModal(card.getAttribute('data-job-id'));
    });
    card.addEventListener('dragstart', function(e){
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.getAttribute('data-job-id'));
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function(){
      card.classList.remove('dragging');
    });
  });
  wrap.querySelectorAll('[data-new-job-status]').forEach(function(btn){
    btn.addEventListener('click', function(){ openJobModal(null, btn.getAttribute('data-new-job-status')); });
  });

  wrap.querySelectorAll('[data-status-col]').forEach(function(col){
    col.addEventListener('dragover', function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', function(){
      col.classList.remove('drag-over');
    });
    col.addEventListener('drop', function(e){
      e.preventDefault();
      col.classList.remove('drag-over');
      var jobId = e.dataTransfer.getData('text/plain');
      var newStatus = col.getAttribute('data-status-col');
      var job = state.jobs.find(function(j){ return j.id===jobId; });
      if(job && job.status!==newStatus){
        job.status = newStatus;
        saveJobs();
        showToast('Movido para "' + (newStatus===STATUS_CANCELLED?'Cancelado':statusLabel(newStatus)) + '".');
        renderKanban();
      }
    });
  });
}

function kanbanCardHtml(job){
  var brand = brandById(job.brandId);
  var platform = platformById(job.platformId);
  var d = job.deadline ? daysUntil(job.deadline) : null;
  var deadlineText = null;
  if(d!==null){
    deadlineText = d<0 ? Math.abs(d)+'d atrasado' : d===0 ? 'hoje' : d===1 ? 'amanhã' : fmtDate(job.deadline);
  }

  // Progresso de vídeos produzidos (só aparece se tem 2+ vídeos e algum check feito)
  var videoProgress = '';
  if(job.videoCount && parseInt(job.videoCount,10) >= 2 && job.videosDone){
    var total = parseInt(job.videoCount,10);
    var done = Object.values(job.videosDone).filter(Boolean).length;
    if(done > 0){
      var pct = Math.round((done/total)*100);
      videoProgress = '<div style="margin-top:8px;">' +
        '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">' +
          '<span style="font-size:11px; color:var(--ink-faint);">'+done+'/'+total+' vídeos</span>' +
          '<span style="font-size:11px; color:var(--sage-deep); font-weight:600;">'+pct+'%</span>' +
        '</div>' +
        '<div style="height:3px; border-radius:99px; background:var(--line);">' +
          '<div style="height:3px; border-radius:99px; background:var(--sage); width:'+pct+'%;"></div>' +
        '</div>' +
      '</div>';
    }
  }

  return '<div class="kanban-card" draggable="true" data-job-id="'+job.id+'" tabindex="0" role="button" aria-label="Abrir '+escapeHtml(job.title)+'">' +
    '<p class="kanban-card-title">'+escapeHtml(brand?brand.name:(job.title||'Sem título'))+'</p>' +
    '<div class="kanban-tags">' +
      platformBadgeHtml(platform) +
      (job.value ? '<span class="tag-value">'+fmtCurrency(parseMoneyGuess(job.value), job.currency)+'</span>' : '') +
    '</div>' +
    videoProgress +
    (deadlineText ? '<div style="margin-top:8px;"><span class="tag tag-deadline">'+escapeHtml(deadlineText)+'</span></div>' : '') +
  '</div>';
}

/* ---------------- render: agenda (intelligent calendar) ---------------- */
var MONTH_NAMES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
var DOW_NAMES = ["dom","seg","ter","qua","qui","sex","sáb"];

var AGENDA_CATEGORIES = {
  entregas:    {label:'Entregas',         dot:'#D6455A', filterKey:'entregas'},
  pagamentos:  {label:'Pagamentos',       dot:'#4E9B63', filterKey:'pagamentos'},
  produtos:    {label:'Produtos',         dot:'#8868B0', filterKey:'produtos'},
  followup:    {label:'Follow-up',        dot:'#4E7FB0', filterKey:'followup'},
  pessoal:     {label:'Eventos pessoais', dot:'#D6A53E', filterKey:'pessoal'},
  gravacao:    {label:'Gravações',        dot:'#E0779A', filterKey:'gravacao'},
  edicao:      {label:'Edição',           dot:'#5BBCC2', filterKey:'edicao'}
};

/* Builds the full list of agenda events for the current month by aggregating
   every module — nothing here is a manually-created "event", it's all derived
   live from existing data, per the brief ("calendário não deve depender só de
   eventos manuais"). */
function buildAgendaEvents(year, month){
  var events = [];

  state.jobs.forEach(function(j){
    if(j.status===STATUS_CANCELLED) return;
    var brand = brandById(j.brandId);
    var label = (brand?brand.name:j.title||'Trabalho');

    if(j.deadline){
      var cat = j.status==='gravacao' ? 'gravacao' : j.status==='edicao' ? 'edicao' : 'entregas';
      events.push({date:j.deadline, category:cat, title:label+' — entrega', jobId:j.id, route:'jobs'});
    }
  });

  getReceivableItems().forEach(function(it){
    if(it.paid || !it.date) return;
    events.push({date:it.date, category:'pagamentos', title:it.label+' — '+fmtCurrency(it.value, it.currency), jobId:it.jobId, route:'payments'});
  });

  state.products.forEach(function(p){
    if(p.status==='recebido' || !p.expectedDate) return;
    var brand = brandById(p.brandId);
    events.push({date:p.expectedDate, category:'produtos', title:(brand?brand.name+' — ':'')+p.name, productId:p.id, route:'products'});
  });

  state.checklist.forEach(function(c){
    if(c.done || !c.date) return;
    var cat = c.category==='pessoal' ? 'pessoal' : null;
    if(!cat) return; // work checklist items are already represented via job deadlines
    events.push({date:c.date, category:'pessoal', title:c.text, checkId:c.id, route:'checklist'});
  });

  state.prospects.forEach(function(p){
    if(p.status!=='followup1' && p.status!=='followup2') return;
    var refDate = p.updatedAt || p.createdAt;
    if(!refDate) return;
    // Surface a follow-up reminder 3 days after the last touch, so it's actionable on the calendar.
    var d = new Date(refDate);
    d.setDate(d.getDate()+3);
    events.push({date:isoDate(d), category:'followup', title:'Follow-up — '+p.brandName, prospectId:p.id, route:'prospects'});
  });

  return events.filter(function(e){
    var d = new Date(e.date+"T00:00:00");
    return d.getFullYear()===year && d.getMonth()===month;
  });
}

function renderAgenda(){
  var html = '';
  html += '<div class="page-head"><div><h1>Agenda</h1><p class="page-sub">Tudo que importa este mês, reunido automaticamente.</p></div></div>';
  html += '<div class="cal-head">' +
    '<button class="btn btn-sm" id="calPrev">‹</button>' +
    '<span class="cal-title display" id="calTitle"></span>' +
    '<button class="btn btn-sm" id="calNext">›</button>' +
    '<button class="btn btn-sm btn-ghost" id="calToday">hoje</button>' +
  '</div>';

  html += '<div class="agenda-filters" id="agendaFiltersWrap">' +
    Object.keys(AGENDA_CATEGORIES).map(function(key){
      var c = AGENDA_CATEGORIES[key];
      var active = state.agendaFilters[key]!==false;
      return '<button class="agenda-filter-chip '+(active?'active':'')+'" data-agenda-filter="'+key+'">' +
        '<span class="status-dot" style="background:'+c.dot+';"></span>' + escapeHtml(c.label) +
      '</button>';
    }).join('') +
  '</div>';

  html += '<div class="cal-grid" id="calGrid"></div>';
  document.getElementById('pageContent').innerHTML = html;

  document.getElementById('calPrev').addEventListener('click', function(){
    state.calMonth--; if(state.calMonth<0){state.calMonth=11; state.calYear--;}
    renderCalGrid();
  });
  document.getElementById('calNext').addEventListener('click', function(){
    state.calMonth++; if(state.calMonth>11){state.calMonth=0; state.calYear++;}
    renderCalGrid();
  });
  document.getElementById('calToday').addEventListener('click', function(){
    var now = new Date();
    state.calMonth = now.getMonth(); state.calYear = now.getFullYear();
    renderCalGrid();
  });
  document.getElementById('agendaFiltersWrap').addEventListener('click', function(e){
    var chip = e.target.closest('[data-agenda-filter]');
    if(!chip) return;
    var key = chip.getAttribute('data-agenda-filter');
    state.agendaFilters[key] = state.agendaFilters[key]===false ? true : false;
    chip.classList.toggle('active', state.agendaFilters[key]!==false);
    renderCalGrid();
  });
  renderCalGrid();
}

function renderCalGrid(){
  document.getElementById('calTitle').textContent = MONTH_NAMES[state.calMonth] + ' de ' + state.calYear;
  var firstDow = new Date(state.calYear, state.calMonth, 1).getDay();
  var daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);

  var allEvents = buildAgendaEvents(state.calYear, state.calMonth)
    .filter(function(e){ return state.agendaFilters[e.category]!==false; });

  var eventsByDay = {};
  allEvents.forEach(function(e){
    var d = new Date(e.date+"T00:00:00");
    var day = d.getDate();
    (eventsByDay[day] = eventsByDay[day] || []).push(e);
  });

  var html = '';
  DOW_NAMES.forEach(function(n){ html += '<div class="cal-dow">'+n+'</div>'; });
  for(var i=0;i<firstDow;i++){ html += '<div class="cal-cell empty-cell"></div>'; }
  for(var day=1; day<=daysInMonth; day++){
    var isToday = today.getFullYear()===state.calYear && today.getMonth()===state.calMonth && today.getDate()===day;
    html += '<div class="cal-cell '+(isToday?'today':'')+'"><span class="cal-daynum">'+day+'</span>';
    (eventsByDay[day]||[]).slice(0,4).forEach(function(e){
      var c = AGENDA_CATEGORIES[e.category];
      html += '<span class="cal-job-chip" style="background:'+c.dot+'22; color:'+c.dot+';" ' +
        'data-agenda-event="1" data-route="'+e.route+'" data-job-id="'+(e.jobId||'')+'" data-product-id="'+(e.productId||'')+'" data-check-id="'+(e.checkId||'')+'" data-prospect-id="'+(e.prospectId||'')+'" ' +
        'title="'+escapeHtml(e.title)+'">'+escapeHtml(e.title)+'</span>';
    });
    if((eventsByDay[day]||[]).length>4){
      html += '<span style="font-size:10px; color:var(--ink-faint); padding:1px 2px;">+'+((eventsByDay[day]||[]).length-4)+' mais</span>';
    }
    html += '</div>';
  }
  document.getElementById('calGrid').innerHTML = html;
  document.querySelectorAll('[data-agenda-event]').forEach(function(chip){
    chip.addEventListener('click', function(){
      var jobId = chip.getAttribute('data-job-id');
      var productId = chip.getAttribute('data-product-id');
      var checkId = chip.getAttribute('data-check-id');
      var prospectId = chip.getAttribute('data-prospect-id');
      var route = chip.getAttribute('data-route');
      if(jobId) { openJobModal(jobId); return; }
      if(productId) { openProductModal(productId); return; }
      if(prospectId) { openProspectModal(prospectId); return; }
      if(checkId) { navigate(route); return; }
      navigate(route);
    });
  });
}

/* ---------------- render: checklist (infinite day scroller) ---------------- */
var DOW_FULL = ["domingo","segunda","terça","quarta","quinta","sexta","sábado"];

function isoDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(d, n){
  var r = new Date(d);
  r.setDate(r.getDate()+n);
  return r;
}
function startOfToday(){
  var d = new Date(); d.setHours(0,0,0,0);
  return d;
}

/* Checklist scroller state: a contiguous window of ISO dates currently rendered.
   Grows at either edge as the user scrolls close to it (infinite navigation). */
var checklistScroll = {
  startDate: null,   // Date object, inclusive
  endDate: null,      // Date object, inclusive
  dayWidth: null,      // measured px width of one day column (for scroll math)
  loadingEdge: false
};
var CHECKLIST_INITIAL_SPAN = 7;   // days visible on first paint
var CHECKLIST_CHUNK = 7;          // days appended per lazy-load step
var CHECKLIST_EDGE_THRESHOLD = 320; // px from edge that triggers loading more days

function renderChecklist(){
  var html = '';
  html += '<div class="page-head"><div><h1>Checklist</h1><p class="page-sub">Tarefas do dia a dia, separadas entre trabalho e pessoal.</p></div></div>';
  html += '<div class="week-head">' +
    '<div class="week-nav">' +
      '<button class="btn btn-sm" id="weekPrev" aria-label="Dias anteriores">‹</button>' +
      '<span class="week-title display" id="weekTitle"></span>' +
      '<button class="btn btn-sm" id="weekNext" aria-label="Próximos dias">›</button>' +
      '<button class="btn btn-sm btn-ghost" id="weekToday">hoje</button>' +
    '</div>' +
  '</div>';
  html += '<div class="week-scroll-viewport"><div class="week-kanban" id="weekKanban"></div></div>';
  document.getElementById('pageContent').innerHTML = html;

  var today = startOfToday();
  checklistScroll.startDate = addDays(today, -Math.floor(CHECKLIST_INITIAL_SPAN/2));
  checklistScroll.endDate = addDays(checklistScroll.startDate, CHECKLIST_INITIAL_SPAN - 1);

  buildChecklistDays({initial:true});

  document.getElementById('weekPrev').addEventListener('click', function(){ scrollChecklistByDays(-CHECKLIST_CHUNK); });
  document.getElementById('weekNext').addEventListener('click', function(){ scrollChecklistByDays(CHECKLIST_CHUNK); });
  document.getElementById('weekToday').addEventListener('click', function(){ scrollChecklistToToday(); });

  var scroller = document.getElementById('weekKanban');
  scroller.addEventListener('scroll', onChecklistScroll, {passive:true});
}

/* Returns auto checklist items derived from job deadlines (not stored separately —
   computed live so they always reflect the source of truth in state.jobs). */
function autoDeadlineItemsForDate(dateIso){
  return state.jobs
    .filter(function(j){ return j.deadline === dateIso && j.status !== STATUS_CANCELLED && j.status !== 'pago'; })
    .map(function(j){
      var brand = brandById(j.brandId);
      return {
        id: 'auto-' + j.id,
        jobId: j.id,
        text: (brand ? brand.name + ' — ' : '') + (j.contentType || 'Entrega'),
        auto: true
      };
    });
}

function buildChecklistDays(opts){
  opts = opts || {};
  var wrap = document.getElementById('weekKanban');
  if(!wrap) return;
  var today = startOfToday();
  var todayIso = isoDate(today);

  var html = '';
  var cursor = new Date(checklistScroll.startDate);
  while(cursor <= checklistScroll.endDate){
    html += checklistDayColumnHtml(cursor, todayIso);
    cursor = addDays(cursor, 1);
  }
  wrap.innerHTML = html;
  bindChecklistDayHandlers(wrap);
  updateChecklistTitle();

  if(opts.initial){
    // Center on today after first paint.
    requestAnimationFrame(function(){
      var todayCol = wrap.querySelector('.week-col.is-today');
      if(todayCol){
        var target = todayCol.offsetLeft - (wrap.clientWidth - todayCol.offsetWidth)/2;
        wrap.scrollLeft = Math.max(0, target);
      }
    });
  }
}

function checklistDayColumnHtml(d, todayIso){
  var diso = isoDate(d);
  var isToday = diso===todayIso;
  return '<div class="week-col '+(isToday?'is-today':'')+'" data-day-col="'+diso+'">' +
    '<div class="week-col-head"><div class="week-col-dow">'+DOW_FULL[d.getDay()]+'</div><div class="week-col-date">'+d.getDate()+' '+d.toLocaleDateString('pt-BR',{month:'short'})+'</div></div>' +
    '<div class="week-col-body">' +
      weekCatBlock(diso, 'trabalho', 'cat-work', 'Trabalho') +
      weekCatBlock(diso, 'pessoal', 'cat-personal', 'Pessoal') +
    '</div>' +
  '</div>';
}

function weekCatBlock(dateIso, category, catClass, label){
  var items = state.checklist.filter(function(c){ return c.date===dateIso && c.category===category; })
    .sort(function(a,b){ if(a.done!==b.done) return a.done?1:-1; return (a.createdAt||0)-(b.createdAt||0); });
  var autoItems = category==='trabalho' ? autoDeadlineItemsForDate(dateIso) : [];

  var html = '<div data-cat-block="'+dateIso+'|'+category+'"><div class="week-cat-label '+catClass+'">'+label+'</div>';
  if(items.length>0 || autoItems.length>0){
    html += '<div class="check-list">';
    html += autoItems.map(function(a){
      return '<div class="check-item auto-deadline" draggable="true" data-drag-item="auto" data-job-id="'+a.jobId+'" data-open-job="'+a.jobId+'">' +
        '<span class="check-box" aria-hidden="true" style="visibility:hidden;"></span>' +
        '<span class="check-text">'+escapeHtml(a.text)+'<br><span class="check-auto-tag">prazo</span></span>' +
      '</div>';
    }).join('');
    html += items.map(function(c){
      return '<div class="check-item '+(c.done?'checked':'')+'" draggable="true" data-drag-item="task" data-check-id="'+c.id+'">' +
        '<button class="check-box '+(c.done?'checked':'')+'" data-toggle-check="'+c.id+'" aria-label="Marcar como concluída">'+(c.done?'✓':'')+'</button>' +
        '<span class="check-text">'+escapeHtml(c.text)+'</span>' +
        '<button class="check-del" data-del-check="'+c.id+'" aria-label="Excluir tarefa">✕</button>' +
      '</div>';
    }).join('');
    html += '</div>';
  }
  html += '<button class="week-add" data-add-check="'+dateIso+'|'+category+'">+ Adicionar</button></div>';
  return html;
}

function bindChecklistDayHandlers(wrap){
  wrap.querySelectorAll('[data-toggle-check]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var item = state.checklist.find(function(c){return c.id===btn.getAttribute('data-toggle-check');});
      if(!item) return;
      item.done = !item.done;
      saveChecklist();
      refreshChecklistDay(item.date);
    });
  });
  wrap.querySelectorAll('[data-del-check]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var item = state.checklist.find(function(c){return c.id===btn.getAttribute('data-del-check');});
      var dateIso = item ? item.date : null;
      state.checklist = state.checklist.filter(function(c){return c.id!==btn.getAttribute('data-del-check');});
      saveChecklist();
      if(dateIso) refreshChecklistDay(dateIso); else buildChecklistDays();
      showToast('Tarefa removida.');
    });
  });
  wrap.querySelectorAll('[data-add-check]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var parts = btn.getAttribute('data-add-check').split('|');
      promptAddCheck(parts[0], parts[1]);
    });
  });
  wrap.querySelectorAll('[data-open-job]').forEach(function(el){
    el.addEventListener('click', function(){ openJobModal(el.getAttribute('data-open-job')); });
  });

  bindChecklistDragHandlers(wrap);
}

/* Re-renders only the affected day column instead of the whole scroller,
   so scroll position is preserved and nothing flickers. */
function refreshChecklistDay(dateIso){
  var wrap = document.getElementById('weekKanban');
  if(!wrap) return;
  var col = wrap.querySelector('[data-day-col="'+dateIso+'"]');
  if(!col){ buildChecklistDays(); return; }
  var d = new Date(dateIso+"T00:00:00");
  var todayIso = isoDate(startOfToday());
  var temp = document.createElement('div');
  temp.innerHTML = checklistDayColumnHtml(d, todayIso);
  col.replaceWith(temp.firstElementChild);
  bindChecklistDayHandlers(wrap);
}

function updateChecklistTitle(){
  var titleEl = document.getElementById('weekTitle');
  if(!titleEl) return;
  titleEl.textContent = checklistScroll.startDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) +
    ' – ' + checklistScroll.endDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

function scrollChecklistByDays(n){
  var wrap = document.getElementById('weekKanban');
  if(!wrap) return;
  var col = wrap.querySelector('.week-col');
  var step = col ? (col.getBoundingClientRect().width + 16) * n : 200*n;
  wrap.scrollBy({left:step, behavior:'smooth'});
}

function scrollChecklistToToday(){
  var today = startOfToday();
  if(today < checklistScroll.startDate || today > checklistScroll.endDate){
    checklistScroll.startDate = addDays(today, -Math.floor(CHECKLIST_INITIAL_SPAN/2));
    checklistScroll.endDate = addDays(checklistScroll.startDate, CHECKLIST_INITIAL_SPAN - 1);
    buildChecklistDays({initial:true});
    return;
  }
  var wrap = document.getElementById('weekKanban');
  var todayCol = wrap.querySelector('.week-col.is-today');
  if(todayCol){
    var target = todayCol.offsetLeft - (wrap.clientWidth - todayCol.offsetWidth)/2;
    wrap.scrollTo({left:Math.max(0,target), behavior:'smooth'});
  }
}

/* Infinite scroll: as the user nears either edge, prepend/append more days
   without resetting scroll position. */
function onChecklistScroll(e){
  if(checklistScroll.loadingEdge) return;
  var wrap = e.target;
  var nearRightEdge = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - CHECKLIST_EDGE_THRESHOLD;
  var nearLeftEdge = wrap.scrollLeft <= CHECKLIST_EDGE_THRESHOLD;

  if(nearRightEdge){
    appendChecklistDays(CHECKLIST_CHUNK);
  } else if(nearLeftEdge){
    prependChecklistDays(CHECKLIST_CHUNK);
  }
}

function appendChecklistDays(n){
  checklistScroll.loadingEdge = true;
  var wrap = document.getElementById('weekKanban');
  var todayIso = isoDate(startOfToday());
  var frag = document.createDocumentFragment();
  var cursor = addDays(checklistScroll.endDate, 1);
  for(var i=0;i<n;i++){
    var temp = document.createElement('div');
    temp.innerHTML = checklistDayColumnHtml(cursor, todayIso);
    frag.appendChild(temp.firstElementChild);
    cursor = addDays(cursor, 1);
  }
  checklistScroll.endDate = addDays(checklistScroll.endDate, n);
  wrap.appendChild(frag);
  bindChecklistDayHandlers(wrap);
  updateChecklistTitle();
  checklistScroll.loadingEdge = false;
}

function prependChecklistDays(n){
  checklistScroll.loadingEdge = true;
  var wrap = document.getElementById('weekKanban');
  var todayIso = isoDate(startOfToday());
  var prevScrollWidth = wrap.scrollWidth;
  var prevScrollLeft = wrap.scrollLeft;

  var frag = document.createDocumentFragment();
  var cursor = addDays(checklistScroll.startDate, -n);
  var days = [];
  for(var i=0;i<n;i++){ days.push(addDays(cursor, i)); }
  days.forEach(function(d){
    var temp = document.createElement('div');
    temp.innerHTML = checklistDayColumnHtml(d, todayIso);
    frag.appendChild(temp.firstElementChild);
  });
  checklistScroll.startDate = cursor;
  wrap.insertBefore(frag, wrap.firstChild);
  bindChecklistDayHandlers(wrap);
  updateChecklistTitle();

  // Preserve visual scroll position since we just inserted content to the left.
  wrap.scrollLeft = prevScrollLeft + (wrap.scrollWidth - prevScrollWidth);
  checklistScroll.loadingEdge = false;
}

/* ---- drag and drop: move a task (or a job's deadline) to another day ---- */
var checklistDrag = null; // {type:'task'|'auto', id, sourceDateIso}

function bindChecklistDragHandlers(wrap){
  wrap.querySelectorAll('[data-drag-item]').forEach(function(el){
    el.addEventListener('dragstart', function(e){
      var type = el.getAttribute('data-drag-item');
      checklistDrag = {
        type: type,
        checkId: el.getAttribute('data-check-id'),
        jobId: el.getAttribute('data-job-id')
      };
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', function(){
      el.classList.remove('dragging');
      checklistDrag = null;
    });
  });

  wrap.querySelectorAll('[data-cat-block]').forEach(function(block){
    block.addEventListener('dragover', function(e){
      var parts = block.getAttribute('data-cat-block').split('|');
      var category = parts[1];
      // Auto deadline items only belong in "trabalho" — block drops elsewhere.
      if(checklistDrag && checklistDrag.type==='auto' && category!=='trabalho') return;
      e.preventDefault();
      block.closest('.week-col-body').classList.add('drag-over');
    });
    block.addEventListener('dragleave', function(){
      block.closest('.week-col-body').classList.remove('drag-over');
    });
    block.addEventListener('drop', function(e){
      e.preventDefault();
      block.closest('.week-col-body').classList.remove('drag-over');
      if(!checklistDrag) return;
      var parts = block.getAttribute('data-cat-block').split('|');
      var targetDate = parts[0];
      var targetCategory = parts[1];

      if(checklistDrag.type==='task'){
        moveChecklistTask(checklistDrag.checkId, targetDate, targetCategory);
      } else if(checklistDrag.type==='auto' && targetCategory==='trabalho'){
        moveJobDeadline(checklistDrag.jobId, targetDate);
      }
      checklistDrag = null;
    });
  });
}

function moveChecklistTask(checkId, targetDate, targetCategory){
  var item = state.checklist.find(function(c){ return c.id===checkId; });
  if(!item) return;
  var sourceDate = item.date;
  if(item.date===targetDate && item.category===targetCategory) return;
  item.date = targetDate;
  item.category = targetCategory;
  saveChecklist();
  refreshChecklistDay(sourceDate);
  if(targetDate!==sourceDate) refreshChecklistDay(targetDate);
  showToast('Tarefa movida.');
}

function moveJobDeadline(jobId, targetDate){
  var job = state.jobs.find(function(j){ return j.id===jobId; });
  if(!job) return;
  var sourceDate = job.deadline;
  if(sourceDate===targetDate) return;
  job.deadline = targetDate;
  saveJobs();
  if(sourceDate) refreshChecklistDay(sourceDate);
  refreshChecklistDay(targetDate);
  showToast('Prazo do trabalho atualizado.');
}

/* ---------------- finance helpers (shared by dashboard + payments) ---------------- */
function financeSummary(){
  var activeJobs = state.jobs.filter(function(j){ return j.status!==STATUS_CANCELLED; });

  var receivedFromJobs = 0;
  var pendingFromJobs = 0;
  activeJobs.forEach(function(j){
    receivedFromJobs += jobPaidValue(j);
    pendingFromJobs += jobPendingValue(j);
  });
  var previsto = receivedFromJobs + pendingFromJobs;

  var realExpenses = state.expenses.filter(function(e){ return e.type!=='reembolso'; });
  var refunds = state.expenses.filter(function(e){ return e.type==='reembolso'; });

  var paidExpenses = realExpenses.filter(function(e){ return e.paid; });
  var unpaidExpenses = realExpenses.filter(function(e){ return !e.paid; });
  var totalExpenses = paidExpenses.reduce(function(s,e){ return s+parseMoneyGuess(e.value); }, 0);

  var receivedRefunds = refunds.filter(function(e){ return e.paid; }).reduce(function(s,e){ return s+parseMoneyGuess(e.value); }, 0);
  var pendingRefunds = refunds.filter(function(e){ return !e.paid; }).reduce(function(s,e){ return s+parseMoneyGuess(e.value); }, 0);

  // Lucro líquido: tudo que entrou (trabalhos pagos + reembolsos recebidos) menos despesas pagas.
  var lucroLiquido = (receivedFromJobs + receivedRefunds) - totalExpenses;
  // Saldo: a mesma conta, é o resultado líquido acumulado até agora.
  var saldo = lucroLiquido;
  // Fluxo de caixa previsto: o que ainda vai entrar/sair, considerando pendências de ambos os lados.
  var fluxoCaixaPrevisto = saldo + pendingFromJobs + pendingRefunds - unpaidExpenses.reduce(function(s,e){ return s+parseMoneyGuess(e.value); }, 0);

  return {
    previsto: previsto,
    recebido: receivedFromJobs,
    pendente: pendingFromJobs,
    despesas: totalExpenses,
    despesasPendentes: unpaidExpenses.reduce(function(s,e){ return s+parseMoneyGuess(e.value); }, 0),
    reembolsosRecebidos: receivedRefunds,
    reembolsosPendentes: pendingRefunds,
    lucroLiquido: lucroLiquido,
    saldo: saldo,
    fluxoCaixaPrevisto: fluxoCaixaPrevisto,
    jobsFechados: activeJobs.length,
    awaitingJobs: state.jobs.filter(function(j){ return j.status==='aguardando_pagamento'; }),
    paidJobs: state.jobs.filter(function(j){ return j.status==='pago'; })
  };
}

/* returns a flat list of receivable items: one row per installment, or one row per single-payment job */
function getReceivableItems(){
  var items = [];
  state.jobs.filter(function(j){ return j.status!==STATUS_CANCELLED; }).forEach(function(j){
    var brand = brandById(j.brandId);
    if(j.paymentType==='split' && j.installments && j.installments.length>0){
      j.installments.forEach(function(inst, idx){
        items.push({
          jobId:j.id, installmentId:inst.id, installmentIndex:idx,
          label:(brand?brand.name:j.title) + ' · ' + inst.label,
          value:parseMoneyGuess(inst.value), currency:j.currency||'BRL', paid:!!inst.paid,
          date: inst.paid ? inst.paidDate : (inst.dueDate || j.payDate || j.deadline),
          contentType: j.contentType
        });
      });
    } else {
      items.push({
        jobId:j.id, installmentId:null, installmentIndex:null,
        label:(brand?brand.name:j.title),
        value:parseMoneyGuess(j.value), currency:j.currency||'BRL', paid:j.status==='pago',
        date: j.status==='pago' ? j.payDate : (j.payDate || j.deadline),
        contentType: j.contentType
      });
    }
  });
  return items;
}

function markReceivablePaid(jobId, installmentId){
  var job = state.jobs.find(function(j){ return j.id===jobId; });
  if(!job) return;
  if(installmentId){
    var inst = (job.installments||[]).find(function(i){ return i.id===installmentId; });
    if(!inst) return;
    inst.paid = true;
    inst.paidDate = isoDate(new Date());
    var allPaid = job.installments.every(function(i){ return i.paid; });
    if(allPaid && job.status!=='pago'){ job.status = 'pago'; }
  } else {
    job.status = 'pago';
    job.payDate = job.payDate || isoDate(new Date());
  }
  saveJobs();
  showToast('Marcado como recebido.');
}

            '<input id="fx_'+c.code+'" type="text" inputmode="decimal" placeholder="Ex: 5,40" value="'+escapeHtml(String(state.exchangeRates[c.code]||'').replace('.',','))+'" /></div>';
        }).join('') +

  document.getElementById('fxCancel').addEventListener('click', close);
  document.getElementById('fxOverlay').addEventListener('click', function(e){ if(e.target.id==='fxOverlay') close(); });

  document.getElementById('fxSave').addEventListener('click', function(){
    var newRates = {BRL:1};
    var hasInvalid = false;
    foreignCurrencies.forEach(function(c){
      var raw = document.getElementById('fx_'+c.code).value.trim();
      var n = parseMoneyGuess(raw);
      if(!raw || n<=0){ hasInvalid = true; return; }
      newRates[c.code] = n;
    });

      showToast('Taxas de câmbio atualizadas.');
