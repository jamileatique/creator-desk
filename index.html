  var isNew = !brand;
  var brandJobs = brand ? state.jobs.filter(function(j){return j.brandId===brand.id;}) : [];

  var modalHtml =
    '<div class="overlay" id="brandOverlay">' +
      '<div class="modal" role="dialog" aria-modal="true" aria-labelledby="brandModalTitle">' +
        '<div class="modal-head"><h2 id="brandModalTitle">'+(isNew?'Nova marca':'Editar marca')+'</h2>' +
          '<button class="modal-close" id="brandModalClose" aria-label="Fechar">✕</button></div>' +
        '<div class="field"><label for="bName">Nome da marca</label>' +
          '<input id="bName" type="text" placeholder="Ex: Loja da Ana" value="'+escapeHtml(brand?brand.name:'')+'" /></div>' +
        '<div class="field"><label for="bContact">Contato</label>' +
          '<input id="bContact" type="text" placeholder="Email, telefone ou @ do Instagram" value="'+escapeHtml(brand?brand.contact:'')+'" /></div>' +
        '<div class="field"><label for="bNotes">Notas</label>' +
          '<textarea id="bNotes" placeholder="Como te encontraram, preferências, histórico...">'+escapeHtml(brand?brand.notes:'')+'</textarea></div>' +
        (brand ? '<p style="font-size:12.5px; color:var(--ink-faint); margin:-4px 0 16px;">'+brandJobs.length+' trabalho(s) vinculado(s) a essa marca.</p>' : '') +
        '<div class="modal-actions">' +
          (isNew ? '' : '<button class="btn btn-danger-text" id="bDelete" style="margin-right:auto;">excluir marca</button>') +
          '<button class="btn btn-ghost" id="bCancel">cancelar</button>' +
          '<button class="btn btn-primary" id="bSave">'+(isNew?'Criar marca':'Salvar alterações')+'</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('bName').focus();

  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('brandModalClose').addEventListener('click', close);
  document.getElementById('bCancel').addEventListener('click', close);
  document.getElementById('brandOverlay').addEventListener('click', function(e){ if(e.target.id==='brandOverlay') close(); });

  if(!isNew){
    document.getElementById('bDelete').addEventListener('click', function(){
      if(brandJobs.length>0){ showToast('Não dá pra excluir: essa marca tem trabalhos vinculados.'); return; }
      if(confirm('Excluir esta marca?')){
        state.brands = state.brands.filter(function(b){return b.id!==brand.id;});
        saveBrands();
        close();
        showToast('Marca excluída.');
        render();
      }
    });
  }

  document.getElementById('bSave').addEventListener('click', function(){
    var name = document.getElementById('bName').value.trim();
    if(!name){ showToast('Dá um nome pra marca antes de salvar.'); document.getElementById('bName').focus(); return; }
    var data = {
      name: name,
      contact: document.getElementById('bContact').value.trim(),
      notes: document.getElementById('bNotes').value.trim()
    };
    if(isNew){
      data.id = uid(); data.createdAt = Date.now();
      state.brands.push(data);
      showToast('Marca criada.');
    } else {
      Object.assign(brand, data);
      showToast('Alterações salvas.');
    }
    var btn = document.getElementById('bSave');
    btn.disabled = true;
    saveBrands().then(function(){
      close();
      render();
      if(onSavedCallback) onSavedCallback();
    }).catch(function(){
      btn.disabled = false;
    });
  });
}

/* ---------------- modal: platform ---------------- */
function openPlatformModal(platformId){
  var platform = platformId ? state.platforms.find(function(p){return p.id===platformId;}) : null;
  var isNew = !platform;
  var count = platform ? state.jobs.filter(function(j){return j.platformId===platform.id;}).length : 0;

  var modalHtml =
    '<div class="overlay" id="platOverlay">' +
      '<div class="modal" role="dialog" aria-modal="true" style="max-width:420px;" aria-labelledby="platModalTitle">' +
        '<div class="modal-head"><h2 id="platModalTitle">'+(isNew?'Nova plataforma':'Editar plataforma')+'</h2>' +
          '<button class="modal-close" id="platModalClose" aria-label="Fechar">✕</button></div>' +
        '<div class="field"><label for="pName">Nome da plataforma</label>' +
          '<input id="pName" type="text" placeholder="Ex: Destrava UGC" value="'+escapeHtml(platform?platform.name:'')+'" /></div>' +
        (platform ? '<p style="font-size:12.5px; color:var(--ink-faint); margin:-4px 0 16px;">'+count+' trabalho(s) nessa plataforma.</p>' : '') +
        '<div class="modal-actions">' +
          (isNew ? '' : '<button class="btn btn-danger-text" id="pDelete" style="margin-right:auto;">excluir</button>') +
          '<button class="btn btn-ghost" id="pCancel">cancelar</button>' +
          '<button class="btn btn-primary" id="pSave">'+(isNew?'Criar':'Salvar')+'</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('pName').focus();

  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('platModalClose').addEventListener('click', close);
  document.getElementById('pCancel').addEventListener('click', close);
  document.getElementById('platOverlay').addEventListener('click', function(e){ if(e.target.id==='platOverlay') close(); });

  if(!isNew){
    document.getElementById('pDelete').addEventListener('click', function(){
      if(count>0){ showToast('Não dá pra excluir: tem trabalhos nessa plataforma.'); return; }
      if(confirm('Excluir esta plataforma?')){
        state.platforms = state.platforms.filter(function(p){return p.id!==platform.id;});
        savePlatforms();
        close();
        showToast('Plataforma excluída.');
        render();
      }
    });
  }

  document.getElementById('pSave').addEventListener('click', function(){
    var name = document.getElementById('pName').value.trim();
    if(!name){ showToast('Dá um nome pra plataforma.'); return; }
    if(isNew){
      state.platforms.push({id:uid(), name:name, createdAt:Date.now()});
      showToast('Plataforma criada.');
    } else {
      platform.name = name;
      showToast('Alterações salvas.');
    }
    savePlatforms();
    close();
    render();
  });
}

/* ---------------- main render dispatcher ---------------- */
function render(){
  if(!state.loaded){
    document.getElementById('pageContent').innerHTML = '<p style="color:var(--ink-faint);">Carregando seus dados...</p>';
    return;
  }
  if(state.route==='dashboard') renderDashboard();
  else if(state.route==='prospects') renderProspects();
  else if(state.route==='jobs') renderJobs();
  else if(state.route==='agenda') renderAgenda();
  else if(state.route==='checklist') renderChecklist();
  else if(state.route==='brands') renderBrands();
  else if(state.route==='platforms') renderPlatforms();
  else if(state.route==='payments') renderPayments();
  else if(state.route==='metrics') renderMetrics();
  else if(state.route==='contracts') renderContracts();
}

  var html = '';

    '<button class="btn btn-sm btn-ghost" id="btnEditProfile">'+(prof?'editar':'+ cadastrar')+'</button></div>';

  if(!prof){
    html += emptyState("Você ainda não cadastrou seus dados padrão. Cadastre uma vez e use em todos os contratos.", "btnEmptyProfile", "+ Cadastrar meus dados");

      '<div class="field-row-3">' +
        '<div class="field"><label for="cVideos">Qtd. vídeos</label><input id="cVideos" type="number" min="0" value="2" /></div>' +

        '<div class="field"><label for="cValue">Valor total (R$)</label><input id="cValue" type="text" placeholder="Ex: 540" /></div>' +
        '<div class="field"><label for="cDate">Data do contrato</label><input id="cDate" type="date" value="'+isoDate(new Date())+'" /></div>' +
      '</div>' +

    '</div>';

  html += '</div>';

  document.getElementById('pageContent').innerHTML = html;

  var btnEdit = document.getElementById('btnEditProfile');
  if(btnEdit) btnEdit.addEventListener('click', function(){ openContractProfileModal(); });
  var btnEmpty = document.getElementById('btnEmptyProfile');
  if(btnEmpty) btnEmpty.addEventListener('click', function(){ openContractProfileModal(); });
  var btnGen = document.getElementById('btnGenContract');
  if(btnGen) btnGen.addEventListener('click', generateContractPdf);
}

function openContractProfileModal(){
  var prof = state.contractProfile || {};
  var modalHtml =
    '<div class="overlay" id="profOverlay">' +
      '<div class="modal" role="dialog" aria-modal="true">' +
        '<div class="modal-head"><h2>Meus dados (contratada)</h2><button class="modal-close" id="profModalClose" aria-label="Fechar">✕</button></div>' +
        '<div class="field"><label for="cfName">Nome completo</label><input id="cfName" type="text" value="'+escapeHtml(prof.name||'')+'" /></div>' +
        '<div class="field-row">' +
          '<div class="field"><label for="cfNationality">Nacionalidade</label><input id="cfNationality" type="text" placeholder="Ex: brasileira" value="'+escapeHtml(prof.nationality||'')+'" /></div>' +
          '<div class="field"><label for="cfMaritalStatus">Estado civil</label><input id="cfMaritalStatus" type="text" placeholder="Ex: solteira" value="'+escapeHtml(prof.maritalStatus||'')+'" /></div>' +
        '</div>' +
        '<div class="field"><label for="cfDocument">CNPJ ou CPF</label><input id="cfDocument" type="text" value="'+escapeHtml(prof.document||'')+'" /></div>' +
        '<div class="field"><label for="cfAddress">Endereço completo</label><input id="cfAddress" type="text" value="'+escapeHtml(prof.address||'')+'" /></div>' +
        '<div class="field-row">' +
          '<div class="field"><label for="cfPixKey">Chave PIX</label><input id="cfPixKey" type="text" value="'+escapeHtml(prof.pixKey||'')+'" /></div>' +
          '<div class="field"><label for="cfCity">Cidade (sede)</label><input id="cfCity" type="text" value="'+escapeHtml(prof.city||'')+'" /></div>' +
        '</div>' +
        '<div class="field"><label for="cfForum">Foro (comarca)</label><input id="cfForum" type="text" placeholder="Ex: Votorantim, SP" value="'+escapeHtml(prof.forum||'')+'" /></div>' +
        '<div class="modal-actions"><button class="btn btn-ghost" id="cfCancel">cancelar</button><button class="btn btn-primary" id="cfSave">Salvar dados</button></div>' +
      '</div>' +
    '</div>';
  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('cfName').focus();
  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('profModalClose').addEventListener('click', close);
  document.getElementById('cfCancel').addEventListener('click', close);
  document.getElementById('profOverlay').addEventListener('click', function(e){ if(e.target.id==='profOverlay') close(); });
  document.getElementById('cfSave').addEventListener('click', function(){
    var name = document.getElementById('cfName').value.trim();
    if(!name){ showToast('Informe seu nome.'); return; }
    state.contractProfile = {
      name: name,
      nationality: document.getElementById('cfNationality').value.trim(),
      maritalStatus: document.getElementById('cfMaritalStatus').value.trim(),
      document: document.getElementById('cfDocument').value.trim(),
      address: document.getElementById('cfAddress').value.trim(),
      pixKey: document.getElementById('cfPixKey').value.trim(),
      city: document.getElementById('cfCity').value.trim(),
      forum: document.getElementById('cfForum').value.trim()
    };
    saveContractProfile();
    close();
    showToast('Dados salvos.');
    render();
  });
}

function generateContractPdf(){
  var prof = state.contractProfile;
  if(!prof){ showToast('Cadastre seus dados primeiro.'); return; }
  if(typeof window.jspdf === 'undefined'){ showToast('Não foi possível carregar o gerador de PDF.'); return; }

  var brandName = document.getElementById('cBrandName').value.trim();
  var brandDoc = document.getElementById('cBrandDoc').value.trim();
  var brandAddress = document.getElementById('cBrandAddress').value.trim();
  var videos = document.getElementById('cVideos').value || '0';
  var photos = document.getElementById('cPhotos').value || '0';
  var deadlineDays = document.getElementById('cDeadlineDays').value || '5';
  var value = document.getElementById('cValue').value.trim();
  var dateStr = document.getElementById('cDate').value;
  var city = document.getElementById('cCity').value.trim() || prof.city || '';

  if(!brandName){ showToast('Informe o nome da marca contratante.'); return; }

  var valueNum = parseMoneyGuess(value);
  var half = (valueNum/2).toFixed(2).replace('.',',');
  var dateLabel = dateStr ? new Date(dateStr+"T00:00:00").toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}) : '';

  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({unit:'pt', format:'a4'});
  var pageWidth = doc.internal.pageSize.getWidth();
  var margin = 56;
  var maxWidth = pageWidth - margin*2;
  var y = 64;
  var lineHeight = 15;

  function addParagraph(text, opts){
    opts = opts || {};
    doc.setFont('helvetica', opts.bold ? 'bold' : 'normal');
    doc.setFontSize(opts.size || 10.5);
    var lines = doc.splitTextToSize(text, maxWidth);
    lines.forEach(function(line){
      if(y > 770){ doc.addPage(); y = 64; }
      doc.text(line, margin, y);
      y += lineHeight;
    });
    y += opts.spacingAfter!=null ? opts.spacingAfter : 8;
  }
  function addHeading(text){
    if(y > 740){ doc.addPage(); y = 64; }
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text(text, margin, y);
    y += lineHeight + 4;
  }

  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.text('CONTRATO DE PRESTAÇÃO DE SERVIÇOS UGC', pageWidth/2, y, {align:'center'});
  y += 28;

  addHeading('IDENTIFICAÇÃO DAS PARTES');
  addParagraph('CONTRATANTE: ' + brandName + (brandDoc ? ', pessoa jurídica/física inscrita no CNPJ/CPF nº ' + brandDoc : '') + (brandAddress ? ', com sede/endereço em ' + brandAddress + '.' : '.') + ' Neste ato representada por seu representante legal.');
  addParagraph('CONTRATADA: ' + prof.name + (prof.nationality ? ', ' + prof.nationality : '') + (prof.maritalStatus ? ', ' + prof.maritalStatus : '') + ', Creator UGC, portadora do CNPJ/CPF nº ' + (prof.document||'—') + (prof.address ? ', residente e domiciliada em ' + prof.address + '.' : '.'));
  addParagraph('Têm, entre si, justo e contratado o que segue:', {spacingAfter:14});

  addHeading('CLÁUSULA PRIMEIRA – DO OBJETO');
  addParagraph('1.1. O presente contrato tem por objeto a prestação de serviços de criação de conteúdo digital no formato UGC (User Generated Content) pela CONTRATADA à CONTRATANTE.');
  addParagraph('1.2. O pacote contratado inclui a entrega de:');
  addParagraph('• ' + videos + ' vídeo(s) em formato vertical (9:16)');
  addParagraph('• ' + photos + ' foto(s)');
  addParagraph('• Roteirização, captação e edição do material.', {spacingAfter:14});

  addHeading('CLÁUSULA SEGUNDA – DO CRONOGRAMA E LOGÍSTICA');
  addParagraph('2.1. O prazo de entrega do material será de ' + deadlineDays + ' dias úteis, contados a partir da data de recebimento dos produtos pela CONTRATADA.');
  addParagraph('2.2. A CONTRATANTE compromete-se a fornecer os produtos necessários para a produção, arcando integralmente com os custos de envio (frete).');
  addParagraph('2.3. Os produtos enviados para a produção do conteúdo não serão devolvidos, caracterizando-se como bonificação e material de trabalho, salvo acordo prévio por escrito estipulando a logística reversa (também custeada pela CONTRATANTE).', {spacingAfter:14});

  addHeading('CLÁUSULA TERCEIRA – DA APROVAÇÃO E AJUSTES (REFAÇÃO)');
  addParagraph('3.1. A CONTRATADA enviará uma versão prévia do vídeo com uma MARCA D\'ÁGUA para aprovação.');
  addParagraph('3.2. A CONTRATANTE terá o prazo de 3 (três) dias úteis para solicitar ajustes ou aprovar o material.');
  addParagraph('3.3. Do Silêncio (Aprovação Tácita): A ausência de resposta da CONTRATANTE após o prazo de 3 dias úteis implicará na aprovação automática do material, autorizando a cobrança do valor final.');
  addParagraph('3.4. Das Revisões: O valor contratado dá direito a 1 (uma) rodada de ajustes simples (ex: cortes, volume de música, alteração de legenda), desde que estejam dentro do roteiro aprovado previamente.');
  addParagraph('3.5. Refação Extra: Caso a CONTRATANTE solicite alterações que fujam do briefing inicial aprovado, ou que exijam regravação completa por mudança de estratégia da marca, será cobrada uma taxa adicional de 50% do valor do vídeo por alteração.', {spacingAfter:14});

  addHeading('CLÁUSULA QUARTA – DO VALOR E PAGAMENTO');
  addParagraph('4.1. Pela prestação dos serviços, a CONTRATANTE pagará à CONTRATADA o valor total de R$ ' + (value||'—') + '.');
  addParagraph('4.2. O pagamento será realizado da seguinte forma:');
  addParagraph('• 50% (Sinal): R$ ' + half + ' no ato da assinatura deste contrato (para garantir a vaga na agenda e início do roteiro).');
  addParagraph('• 50% (Final): R$ ' + half + ' após a aprovação do vídeo com marca d\'água e ANTES do envio do arquivo final em alta resolução.');
  addParagraph('4.3. O pagamento deverá ser feito via PIX para a Chave: ' + (prof.pixKey||'—') + '.');
  addParagraph('4.4. O atraso no pagamento do valor final acarretará multa de 2% e juros de 1% ao mês, além da suspensão do direito de uso da imagem até a regularização.', {spacingAfter:14});

  addHeading('CLÁUSULA QUINTA – DOS DIREITOS DE USO E IMAGEM');
  addParagraph('5.1. Uso Orgânico: A CONTRATANTE poderá utilizar o conteúdo em suas redes sociais oficiais e site por prazo indeterminado.');
  addParagraph('5.2. Uso em Tráfego Pago (Ads): O uso do conteúdo para anúncios patrocinados (Dark Posts, Spark Ads) é autorizado pelo período de 4 meses a contar da entrega. Após este período, a renovação deverá ser negociada à parte.');
  addParagraph('5.3. Proteção contra IA: Fica expressamente PROIBIDO o uso da voz ou imagem da CONTRATADA para treinamento de Inteligência Artificial, criação de avatares digitais ou "deepfakes".');
  addParagraph('5.4. A CONTRATADA não autoriza o uso de sua imagem em contextos difamatórios, ilícitos ou que firam a moral e os bons costumes.', {spacingAfter:14});

  addHeading('CLÁUSULA SEXTA – DA RESCISÃO E MULTA');
  addParagraph('6.1. Em caso de desistência por parte da CONTRATANTE após o pagamento do sinal e início do roteiro/produção, o valor de 50% (sinal) não será devolvido, servindo como remuneração pelas horas já trabalhadas e reserva de agenda.');
  addParagraph('6.2. Este contrato poderá ser rescindido por ambas as partes mediante aviso prévio, respeitando os direitos adquiridos e trabalhos já executados.', {spacingAfter:14});

  addHeading('CLÁUSULA SÉTIMA – DO FORO');
  addParagraph('7.1. Para dirimir quaisquer controvérsias oriundas do CONTRATO, as partes elegem o foro da comarca de ' + (prof.forum||'—') + '.', {spacingAfter:18});

  addParagraph('E, por estarem assim justos e contratados, assinam o presente instrumento (sendo válida a assinatura eletrônica ou o aceite formal via e-mail/WhatsApp).', {spacingAfter:18});
  addParagraph((city||'—') + ', ' + (dateLabel||'—') + '.', {spacingAfter:36});

  if(y > 700){ doc.addPage(); y = 64; }
  doc.setFont('helvetica','normal');
  doc.setFontSize(10.5);
  doc.text('_______________________________', margin, y);
  doc.text('_______________________________', pageWidth/2 + 20, y);
  y += 16;
  doc.text('CONTRATANTE', margin, y);
  doc.text('CONTRATADA (Creator)', pageWidth/2 + 20, y);

  var fileName = 'contrato-' + brandName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') + '.pdf';
  doc.save(fileName);
  showToast('Contrato gerado e baixado.');
}

  el.style.backgroundImage = "url('data:image/svg+xml," + encoded + "')";
  el.textContent = '';
}

  applyBrandLogo();
  setupCloudAuthUI();
  navigate('dashboard');

  updateSyncUI();

})();
