    var paid = allExpenses.filter(function(e){ return e.paid; }).sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });

    html += '<div class="section"><div class="section-head"><h2>Pendentes ('+unpaid.length+')</h2></div>';
    html += unpaid.length===0 ? emptyState("Nenhuma despesa pendente.")
      : '<div class="kanban-col-body" style="background:transparent;border:none;padding:0;">' + unpaid.map(expenseRowHtml).join('') + '</div>';
    html += '</div>';

    html += '<div class="section"><div class="section-head"><h2>Pagas ('+paid.length+')</h2></div>';
    html += paid.length===0 ? emptyState("Nenhuma despesa registrada.")
      : '<div class="kanban-col-body" style="background:transparent;border:none;padding:0;">' + paid.map(expenseRowHtml).join('') + '</div>';
    html += '</div>';

  } else if(state.paymentsTab==='reembolsos'){
    var allRefunds = state.expenses.filter(function(e){ return e.type==='reembolso'; });
    var unpaidR = allRefunds.filter(function(e){ return !e.paid; }).sort(function(a,b){ return (a.date||'9999').localeCompare(b.date||'9999'); });
    var paidR = allRefunds.filter(function(e){ return e.paid; }).sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });

    html += '<div class="section"><div class="section-head"><h2>A receber ('+unpaidR.length+')</h2></div>';
    html += unpaidR.length===0 ? emptyState("Nenhum reembolso pendente.")
      : '<div class="kanban-col-body" style="background:transparent;border:none;padding:0;">' + unpaidR.map(expenseRowHtml).join('') + '</div>';
    html += '</div>';

    html += '<div class="section"><div class="section-head"><h2>Recebidos ('+paidR.length+')</h2></div>';
    html += paidR.length===0 ? emptyState("Nenhum reembolso registrado.")
      : '<div class="kanban-col-body" style="background:transparent;border:none;padding:0;">' + paidR.map(expenseRowHtml).join('') + '</div>';
    html += '</div>';

  } else {
    var allItems = [];
    getReceivableItems().filter(function(it){return it.paid;}).forEach(function(it){
      allItems.push({type:'receita', date:it.date||'', label:it.label, value:it.value, currency:it.currency, ts:0});
    });
    state.expenses.filter(function(e){return e.paid;}).forEach(function(e){
      var isRefund = e.type==='reembolso';
      allItems.push({
        type: isRefund ? 'reembolso' : 'despesa',
        date:e.date||'',
        label:e.description,
        value: isRefund ? parseMoneyGuess(e.value) : -parseMoneyGuess(e.value),
        currency: e.currency||'BRL',
        ts:e.createdAt||0
      });
    });
    allItems.sort(function(a,b){ return (b.date||'').localeCompare(a.date||'') || b.ts-a.ts; });

    html += '<div class="section"><div class="section-head"><h2>Histórico</h2></div>';
    if(allItems.length===0){
      html += emptyState("Nenhum registro no histórico ainda.");
    } else {
      html += '<div class="kanban-col-body" style="background:transparent;border:none;padding:0;">' + allItems.map(function(it){
        return '<div class="kanban-card" style="display:flex; align-items:center; justify-content:space-between; gap:14px; cursor:default;">' +
          '<div><p class="kanban-card-title" style="margin-bottom:4px;">'+escapeHtml(it.label)+(it.type==='reembolso'?' <span style="font-weight:400; color:var(--ink-soft); font-size:12.5px;">· reembolso</span>':'')+'</p>' +
          '<span style="font-size:12px; color:var(--ink-faint);">'+(it.date?fmtDate(it.date):'sem data')+'</span></div>' +
          '<span class="tag-value" style="color:'+(it.value>=0?'var(--sage-deep)':'var(--danger)')+';">'+(it.value>=0?'+':'-')+fmtCurrency(Math.abs(it.value), it.currency)+'</span>' +
        '</div>';
      }).join('') + '</div>';
    }
    html += '</div>';
  }

  wrap.innerHTML = html;
  wrap.querySelectorAll('[data-open-job]').forEach(function(el){
    el.addEventListener('click', function(){ openJobModal(el.getAttribute('data-open-job')); });
  });
  wrap.querySelectorAll('[data-mark-paid]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var jobId = btn.getAttribute('data-mark-paid');
      var instId = btn.getAttribute('data-inst-id') || null;
      markReceivablePaid(jobId, instId);
      renderPayments();
    });
  });
  wrap.querySelectorAll('[data-expense-id]').forEach(function(card){
    card.addEventListener('click', function(){ openExpenseModal(card.getAttribute('data-expense-id')); });
  });
}

function openRecordModal(){
  var modalHtml =
    '<div class="overlay" id="recordOverlay">' +
      '<div class="modal" role="dialog" aria-modal="true" style="max-width:420px;">' +
        '<div class="modal-head"><h2>Novo registro</h2><button class="modal-close" id="recordModalClose" aria-label="Fechar">✕</button></div>' +
        '<div class="field"><label for="rType">Tipo</label><select id="rType">' +
          '<option value="despesa">Despesa</option>' +
          '<option value="reembolso">Reembolso</option>' +
          '<option value="receita">Receita (trabalho)</option>' +
        '</select></div>' +
        '<div id="recordBody"></div>' +
      '</div>' +
    '</div>';
  document.getElementById('modalRoot').innerHTML = modalHtml;
  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('recordModalClose').addEventListener('click', close);
  document.getElementById('recordOverlay').addEventListener('click', function(e){ if(e.target.id==='recordOverlay') close(); });
  document.getElementById('rType').addEventListener('change', updateRecordBody);
  updateRecordBody();

  function updateRecordBody(){
    var type = document.getElementById('rType').value;
    var body = document.getElementById('recordBody');
    if(type==='receita'){
      body.innerHTML = '<div class="field"><p style="font-size:12.5px; color:var(--ink-soft); margin:0 0 14px;">Receita vem de um trabalho cadastrado. Vamos abrir o formulário de trabalho.</p></div>' +
        '<div class="modal-actions"><button class="btn btn-ghost" id="rCancel">cancelar</button><button class="btn btn-primary" id="rGoJob">Continuar</button></div>';
      document.getElementById('rCancel').addEventListener('click', close);
      document.getElementById('rGoJob').addEventListener('click', function(){
        close();
        openJobModal(null);
      });
      return;
    }

    var isRefund = type==='reembolso';
    var descLabel = isRefund ? 'Do que é o reembolso' : 'Descrição';
    var descPlaceholder = isRefund ? 'Ex: Devolução de frete, produto não usado...' : 'Ex: Edição de vídeo, equipamento...';
    var paidLabel = isRefund ? 'já recebi esse valor' : 'já foi paga';
    var saveLabel = isRefund ? 'Criar reembolso' : 'Criar despesa';

    body.innerHTML =
      '<div class="field"><label for="rDesc">'+descLabel+'</label><input id="rDesc" type="text" placeholder="'+descPlaceholder+'" /></div>' +
      '<div class="field-row">' +
        '<div class="field"><label for="rValue">Valor *</label><input id="rValue" type="text" inputmode="decimal" placeholder="0,00" /></div>' +
        '<div class="field"><label for="rCurrency">Moeda</label><select id="rCurrency">' + CURRENCIES.map(function(c){ return '<option value="'+c.code+'">'+c.label+'</option>'; }).join('') + '</select></div>' +
      '</div>' +
      '<div class="field"><label for="rDate">Data</label><input id="rDate" type="date" /></div>' +
      '<div class="field"><label style="display:flex; align-items:center; gap:8px; font-weight:500; color:var(--ink);"><input type="checkbox" id="rPaid" style="width:auto;" /> '+paidLabel+'</label></div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" id="rCancel">cancelar</button><button class="btn btn-primary" id="rSave">'+saveLabel+'</button></div>';
    document.getElementById('rCancel').addEventListener('click', close);
    document.getElementById('rDesc').focus();
    document.getElementById('rValue').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('rSave').click(); });

    document.getElementById('rSave').addEventListener('click', function(){
      var desc = document.getElementById('rDesc').value.trim();
      var rawValue = document.getElementById('rValue').value.trim();
      var numericValue = parseMoneyGuess(rawValue);

      if(!desc){ showToast(isRefund ? 'Descreva o reembolso.' : 'Descreva a despesa.'); document.getElementById('rDesc').focus(); return; }
      if(!rawValue || numericValue<=0){ showToast('Informe um valor válido, maior que zero.'); document.getElementById('rValue').focus(); return; }

      var btn = document.getElementById('rSave');
      btn.disabled = true;

      state.expenses.push({
        id:uid(), description:desc,
        value: rawValue,
        currency: document.getElementById('rCurrency').value,
        date: document.getElementById('rDate').value,
        paid: document.getElementById('rPaid').checked,
        type: isRefund ? 'reembolso' : 'despesa',
        createdAt: Date.now()
      });
      saveExpenses().then(function(){
        close();
        showToast(isRefund ? 'Reembolso registrado.' : 'Despesa registrada.');
        render();
      }).catch(function(){
        btn.disabled = false;
        showToast('Não foi possível salvar. Tente novamente.');
      });
    });
  }
}

function openExpenseModal(expenseId){

      '<div class="modal" role="dialog" aria-modal="true" style="max-width:420px;">' +
        '<div class="modal-head"><h2>'+(isRefund?'Editar reembolso':'Editar despesa')+'</h2><button class="modal-close" id="expModalClose" aria-label="Fechar">✕</button></div>' +
        '<div class="field"><label for="eType">Tipo</label><select id="eType">' +
          '<option value="despesa" '+(!isRefund?'selected':'')+'>Despesa</option>' +
          '<option value="reembolso" '+(isRefund?'selected':'')+'>Reembolso</option>' +

        '<div class="field-row">' +

          '<div class="field"><label for="eCurrency">Moeda</label><select id="eCurrency">' + CURRENCIES.map(function(c){ return '<option value="'+c.code+'" '+((exp.currency||'BRL')===c.code?'selected':'')+'>'+c.label+'</option>'; }).join('') + '</select></div>' +
        '</div>' +
        '<div class="field"><label for="eDate">Data</label><input id="eDate" type="date" value="'+(exp.date||'')+'" /></div>' +
        '<div class="field"><label id="ePaidLabel" style="display:flex; align-items:center; gap:8px; font-weight:500; color:var(--ink);"><input type="checkbox" id="ePaid" '+(exp.paid?'checked':'')+' style="width:auto;" /> <span id="ePaidLabelText">'+(isRefund?'já recebi esse valor':'já foi paga')+'</span></label></div>' +
        '<div class="modal-actions"><button class="btn btn-danger-text" id="eDelete" style="margin-right:auto;">excluir</button><button class="btn btn-ghost" id="eCancel">cancelar</button><button class="btn btn-primary" id="eSave">Salvar</button></div>' +
      '</div>' +
    '</div>';
  document.getElementById('modalRoot').innerHTML = modalHtml;
  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('expModalClose').addEventListener('click', close);
  document.getElementById('eCancel').addEventListener('click', close);
  document.getElementById('expOverlay').addEventListener('click', function(e){ if(e.target.id==='expOverlay') close(); });
  document.getElementById('eType').addEventListener('change', function(){
    var nowRefund = document.getElementById('eType').value==='reembolso';
    document.getElementById('ePaidLabelText').textContent = nowRefund ? 'já recebi esse valor' : 'já foi paga';
  });
  document.getElementById('eDelete').addEventListener('click', function(){
    if(confirm(isRefund ? 'Excluir este reembolso?' : 'Excluir esta despesa?')){
      state.expenses = state.expenses.filter(function(e){ return e.id!==exp.id; });
      saveExpenses(); close(); showToast(isRefund?'Reembolso excluído.':'Despesa excluída.'); render();
    }
  });
  document.getElementById('eSave').addEventListener('click', function(){
    var desc = document.getElementById('eDesc').value.trim();
    var rawValue = document.getElementById('eValue').value.trim();
    var numericValue = parseMoneyGuess(rawValue);
    if(!desc){ showToast('Descreva o registro.'); document.getElementById('eDesc').focus(); return; }
    if(!rawValue || numericValue<=0){ showToast('Informe um valor válido, maior que zero.'); document.getElementById('eValue').focus(); return; }

    var btn = document.getElementById('eSave');
    btn.disabled = true;
    exp.description = desc;
    exp.value = rawValue;
    exp.currency = document.getElementById('eCurrency').value;
    exp.date = document.getElementById('eDate').value;
    exp.paid = document.getElementById('ePaid').checked;
    exp.type = document.getElementById('eType').value==='reembolso' ? 'reembolso' : 'despesa';
    saveExpenses().then(function(){
      close(); showToast('Atualizado.'); render();
    }).catch(function(){
      btn.disabled = false;
      showToast('Não foi possível salvar. Tente novamente.');
    });
  });
}

/* ---------------- render: metrics ---------------- */
function renderMetrics(){
  var html = '';
  html += '<div class="page-head"><div><h1>Métricas</h1><p class="page-sub">Relatório da sua performance como criadora.</p></div></div>';

  var summary = financeSummary();
  var ticketMedio = summary.paidJobs.length>0 ? summary.recebido/summary.paidJobs.length : 0;

  html += '<div class="metrics">';
  html += metricCard("Trabalhos fechados", summary.jobsFechados, "", "ativos no funil");
  html += metricCard("Receita prevista", fmtBRL(summary.previsto), "", "");
  html += metricCard("Receita recebida", fmtBRL(summary.recebido), "sage", "");
  html += metricCard("Receita pendente", fmtBRL(summary.pendente), "amber", "");
  html += metricCard("Ticket médio", fmtBRL(ticketMedio), "", "por trabalho pago");
  html += metricCard("Lucro líquido", fmtBRL(summary.lucroLiquido), summary.lucroLiquido>=0?"sage":"coral", "");
  html += '</div>';

  // revenue by month (last 6 months)
  var months = [];
  var now = new Date();
  for(var i=5;i>=0;i--){
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({year:d.getFullYear(), month:d.getMonth(), label:d.toLocaleDateString('pt-BR',{month:'short'})+'/'+String(d.getFullYear()).slice(2)});
  }
  var byMonth = months.map(function(m){
    var jobsInMonth = state.jobs.filter(function(j){
      if(j.status===STATUS_CANCELLED) return false;
      var refDate = j.payDate || j.deadline;
      if(!refDate) return false;
      var d = new Date(refDate+"T00:00:00");
      return d.getFullYear()===m.year && d.getMonth()===m.month;
    });
    var total = jobsInMonth.reduce(function(s,j){ return s+parseMoneyBRL(j.value, j.currency); }, 0);
    return {label:m.label, total:total, count:jobsInMonth.length};
  });
  var maxVal = Math.max.apply(null, byMonth.map(function(m){return m.total;}).concat([1]));

  html += '<div class="section"><div class="section-head"><h2>Receita por trabalhos (últimos 6 meses)</h2></div>';
  html += '<div class="table-wrap" style="padding:24px 20px;">';
  html += '<div style="display:flex; align-items:flex-end; gap:16px; height:140px;">';
  byMonth.forEach(function(m){
    var h = maxVal>0 ? Math.max(6, Math.round((m.total/maxVal)*120)) : 6;
    html += '<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%;">' +
      '<span style="font-size:11.5px; font-weight:700; color:var(--ink);">'+fmtBRL(m.total)+'</span>' +
      '<div style="width:100%; max-width:46px; height:'+h+'px; background:var(--magenta); border-radius:6px 6px 2px 2px; opacity:'+(m.total>0?'1':'0.25')+';"></div>' +
      '<span style="font-size:11px; color:var(--ink-soft);">'+m.label+'</span>' +
      '<span style="font-size:10.5px; color:var(--ink-faint);">'+m.count+' job(s)</span>' +
    '</div>';
  });
  html += '</div></div></div>';

  // top brands by revenue
  var byBrand = {};
  state.jobs.filter(function(j){return j.status==='pago';}).forEach(function(j){
    byBrand[j.brandId] = (byBrand[j.brandId]||0) + parseMoneyBRL(j.value, j.currency);
  });
  var topBrands = Object.keys(byBrand).map(function(id){
    var b = brandById(id);
    return {name:b?b.name:'—', total:byBrand[id]};
  }).sort(function(a,b){ return b.total-a.total; }).slice(0,5);
  var maxBrand = Math.max.apply(null, topBrands.map(function(b){return b.total;}).concat([1]));

  html += '<div class="section"><div class="section-head"><h2>Marcas que mais geraram receita</h2></div>';
  if(topBrands.length===0){
    html += emptyState("Nenhum trabalho pago ainda pra gerar esse ranking.");
  } else {
    html += '<div class="table-wrap" style="padding:18px 20px; display:flex; flex-direction:column; gap:14px;">';
    topBrands.forEach(function(b){
      var pct = maxBrand>0 ? Math.round((b.total/maxBrand)*100) : 0;
      html += '<div>' +
        '<div style="display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:5px;"><strong>'+escapeHtml(b.name)+'</strong><span>'+fmtBRL(b.total)+'</span></div>' +
        '<div style="background:var(--lilac); border-radius:999px; height:7px; overflow:hidden;"><div style="width:'+pct+'%; height:100%; background:var(--magenta);"></div></div>' +
      '</div>';
    });
    html += '</div></div>';
  }
  html += '</div>';

  document.getElementById('pageContent').innerHTML = html;
}

/* ---------------- modal: job ---------------- */
function openJobModal(jobId, presetStatus){
  var job = jobId ? state.jobs.find(function(j){return j.id===jobId;}) : null;

  var brandDatalistOptions = state.brands.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(b){
    return '<option value="'+escapeHtml(b.name)+'"></option>';
  }).join('');

  var currentBrand = job ? brandById(job.brandId) : null;

  var platformOptions = '<option value="">— nenhuma —</option>' + state.platforms.map(function(p){
    return '<option value="'+p.id+'" '+(job&&job.platformId===p.id?'selected':'')+'>'+escapeHtml(p.name)+'</option>';
  }).join('');

  var statusOptions = STATUS_FLOW.map(function(s){
    return '<option value="'+s.key+'" '+((job?job.status:presetStatus)===s.key?'selected':'')+'>'+escapeHtml(s.label)+'</option>';
  }).join('') + '<option value="'+STATUS_CANCELLED+'" '+(job&&job.status===STATUS_CANCELLED?'selected':'')+'>Cancelado</option>';

  var contentOptions = CONTENT_TYPES.map(function(c){
    return '<option value="'+escapeHtml(c)+'" '+(job&&job.contentType===c?'selected':'')+'>'+escapeHtml(c)+'</option>';
  }).join('');

  var paymentOptions = PAYMENT_METHODS.map(function(c){
    return '<option value="'+escapeHtml(c)+'" '+(job&&job.paymentMethod===c?'selected':'')+'>'+escapeHtml(c)+'</option>';

      '<div class="modal" role="dialog" aria-modal="true" aria-labelledby="jobModalTitle">' +
        '<div class="modal-head"><h2 id="jobModalTitle">'+(isNew?'Novo trabalho':'Editar trabalho')+'</h2>' +
          '<button class="modal-close" id="jobModalClose" aria-label="Fechar">✕</button></div>' +

        '<div class="field"><label for="jTitle">Título do trabalho</label>' +
          '<input id="jTitle" type="text" placeholder="Ex: 3 vídeos para lançamento" value="'+escapeHtml(job?job.title:'')+'" /></div>' +

        '<div class="field-row">' +
          '<div class="field"><label for="jBrand">Marca *</label>' +
            '<input id="jBrand" type="text" list="jBrandList" placeholder="Digite o nome — se for nova, criamos pra você" value="'+escapeHtml(currentBrand?currentBrand.name:'')+'" autocomplete="off" />' +
            '<datalist id="jBrandList">'+brandDatalistOptions+'</datalist>' +
            '<p style="font-size:11.5px; color:var(--ink-faint); margin:6px 2px 0;">Marca nova? Só escrever o nome — ela é criada automaticamente.</p></div>' +
          '<div class="field"><label for="jPlatform">Plataforma</label><select id="jPlatform">'+platformOptions+'</select></div>' +
        '</div>' +

        '<div class="field"><label for="jStatus">Status *</label><select id="jStatus">'+statusOptions+'</select></div>' +

        '<div class="field"><label for="jContentType">Tipo de conteúdo</label><select id="jContentType">'+contentOptions+'</select></div>' +

        '<div class="field-row">' +
          '<div class="field"><label for="jVideos">Vídeos</label><input id="jVideos" type="number" min="0" placeholder="0" value="'+(job&&job.videoCount!=null?job.videoCount:'')+'" /></div>' +
          '<div class="field"><label for="jPhotos">Fotos</label><input id="jPhotos" type="number" min="0" placeholder="0" value="'+(job&&job.photoCount!=null?job.photoCount:'')+'" /></div>' +
          '<div class="field"><label for="jStories">Stories</label><input id="jStories" type="number" min="0" placeholder="0" value="'+(job&&job.storyCount!=null?job.storyCount:'')+'" /></div>' +
        '</div>' +

        (function(){
          if(isNew) return '';
          var count = job.videoCount ? parseInt(job.videoCount,10) : 0;
          if(count < 2) return '';
          var done = job.videosDone || {};
          var checks = '';

            checks += '<label style="display:flex; align-items:center; gap:9px; padding:7px 4px; border-bottom:1px solid var(--line); cursor:pointer; font-size:13.5px; color:var(--ink);">' +
              '<input type="checkbox" data-video-check="'+v+'" style="width:auto;" '+(isDone?'checked':'')+' />' +

            '</label>';
          }

        '<div class="field-row">' +

            '</div></div>' +
        '</div>' +

        '<div class="field"><label>Tipo de pagamento</label>' +
          '<div style="display:flex; gap:18px; padding:4px 2px;">' +
            '<label style="display:flex; align-items:center; gap:7px; font-weight:500; font-size:13.5px; color:var(--ink);"><input type="radio" name="jPayType" id="jPayTypeSingle" value="single" style="width:auto;" '+((!job||job.paymentType!=='split')?'checked':'')+' /> Pagamento único</label>' +
            '<label style="display:flex; align-items:center; gap:7px; font-weight:500; font-size:13.5px; color:var(--ink);"><input type="radio" name="jPayType" id="jPayTypeSplit" value="split" style="width:auto;" '+((job&&job.paymentType==='split')?'checked':'')+' /> Parcelado</label>' +
          '</div>' +
        '</div>' +

        '<div id="jSplitOptions" style="display:'+((job&&job.paymentType==='split')?'block':'none')+';">' +
          '<div class="field"><label>Dividir em</label>' +
            '<div style="display:flex; flex-direction:column; gap:7px; padding:4px 2px;">' +
              '<label style="display:flex; align-items:center; gap:7px; font-size:13.5px; color:var(--ink);"><input type="radio" name="jSplitMode" id="jSplitHalf" value="half" style="width:auto;" '+((!job||job.splitMode!=='per_video' && job.splitMode!=='custom')?'checked':'')+' /> 50% antes + 50% depois</label>' +
              '<label style="display:flex; align-items:center; gap:7px; font-size:13.5px; color:var(--ink);"><input type="radio" name="jSplitMode" id="jSplitPerVideo" value="per_video" style="width:auto;" '+((job&&job.splitMode==='per_video')?'checked':'')+' /> Por vídeo (1 parcela/vídeo)</label>' +
              '<label style="display:flex; align-items:center; gap:7px; font-size:13.5px; color:var(--ink);"><input type="radio" name="jSplitMode" id="jSplitCustom" value="custom" style="width:auto;" '+((job&&job.splitMode==='custom')?'checked':'')+' /> Personalizado</label>' +
            '</div>' +
          '</div>' +
          '<div class="field"><label>Parcelas</label><div id="jInstallmentsPreview" class="table-wrap" style="padding:10px;"></div></div>' +
          '<button class="btn btn-sm btn-ghost" id="jAddInstallment" type="button" style="display:none; margin:-8px 0 14px;">+ Adicionar parcela</button>' +
        '</div>' +

        '<div class="field"><label for="jNotes">Observações</label>' +
          '<textarea id="jNotes" placeholder="Briefing, nicho, pendências...">'+escapeHtml(job?job.notes:'')+'</textarea></div>' +

        '<div class="modal-actions">' +
          (isNew ? '' : '<button class="btn btn-danger-text" id="jDelete" style="margin-right:auto;">excluir</button>') +
          '<button class="btn btn-ghost" id="jCancel">cancelar</button>' +
          '<button class="btn btn-primary" id="jSave">'+(isNew?'Criar trabalho':'Salvar alterações')+'</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('jTitle').focus();

  var workingInstallments = (job && job.installments) ? job.installments.map(function(i){ return Object.assign({}, i); }) : [];

  function currentSplitMode(){
    var checked = document.querySelector('input[name="jSplitMode"]:checked');
    return checked ? checked.value : 'half';
  }
  function refreshInstallmentsForMode(){
    var mode = currentSplitMode();
    var total = document.getElementById('jValue').value;
    var videos = document.getElementById('jVideos').value || 1;
    if(mode==='custom'){
      if(workingInstallments.length===0){
        workingInstallments = buildInstallments('half', total, videos, null);
      }
    } else {
      workingInstallments = buildInstallments(mode, total, videos, null);
    }
    renderInstallmentsPreview();
  }
  function renderInstallmentsPreview(){
    var mode = currentSplitMode();
    var wrap = document.getElementById('jInstallmentsPreview');
    var addBtn = document.getElementById('jAddInstallment');
    addBtn.style.display = mode==='custom' ? 'inline-flex' : 'none';
    if(workingInstallments.length===0){
      wrap.innerHTML = '<p style="font-size:12.5px; color:var(--ink-faint); margin:4px;">Defina o valor total acima para gerar as parcelas.</p>';
      return;
    }
    wrap.innerHTML = workingInstallments.map(function(inst, idx){
      return '<div style="display:flex; align-items:center; gap:8px; padding:6px 4px; '+(idx>0?'border-top:1px solid var(--line);':'')+'">' +
        (mode==='custom'
          ? '<input type="text" data-inst-label="'+idx+'" value="'+escapeHtml(inst.label)+'" style="flex:1; padding:7px 9px; border-radius:7px; border:1px solid var(--line); font-size:13px;" />'
          : '<span style="flex:1; font-size:13.5px;">'+escapeHtml(inst.label)+'</span>') +
        '<input type="text" data-inst-value="'+idx+'" value="'+escapeHtml(inst.value)+'" style="width:90px; padding:7px 9px; border-radius:7px; border:1px solid var(--line); font-size:13px;" '+(mode!=='custom'?'readonly':'')+' />' +
        (mode==='custom' && workingInstallments.length>1 ? '<button type="button" data-inst-del="'+idx+'" style="border:none;background:transparent;color:var(--ink-faint);font-size:14px;">✕</button>' : '<span style="width:18px;"></span>') +
      '</div>';
    }).join('');

    wrap.querySelectorAll('[data-inst-value]').forEach(function(input){
      input.addEventListener('input', function(){
        var idx = parseInt(input.getAttribute('data-inst-value'),10);
        workingInstallments[idx].value = input.value;
      });
    });
    wrap.querySelectorAll('[data-inst-label]').forEach(function(input){
      input.addEventListener('input', function(){
        var idx = parseInt(input.getAttribute('data-inst-label'),10);
        workingInstallments[idx].label = input.value;
      });
    });
    wrap.querySelectorAll('[data-inst-del]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = parseInt(btn.getAttribute('data-inst-del'),10);
        workingInstallments.splice(idx,1);
        renderInstallmentsPreview();
      });
    });
  }

  document.getElementById('jAddInstallment').addEventListener('click', function(){
    workingInstallments.push({id:uid(), label:'Parcela '+(workingInstallments.length+1), value:'0', dueDate:'', paid:false, paidDate:''});
    renderInstallmentsPreview();
  });

  document.getElementById('jPayTypeSingle').addEventListener('change', toggleSplitVisibility);
  document.getElementById('jPayTypeSplit').addEventListener('change', toggleSplitVisibility);
  function toggleSplitVisibility(){
    var isSplit = document.getElementById('jPayTypeSplit').checked;
    document.getElementById('jSplitOptions').style.display = isSplit ? 'block' : 'none';
    if(isSplit) refreshInstallmentsForMode();
  }
  ['jSplitHalf','jSplitPerVideo','jSplitCustom'].forEach(function(id){
    document.getElementById(id).addEventListener('change', refreshInstallmentsForMode);
  });
  document.getElementById('jValue').addEventListener('input', function(){
    if(document.getElementById('jPayTypeSplit').checked && currentSplitMode()!=='custom') refreshInstallmentsForMode();
  });
  document.getElementById('jVideos').addEventListener('input', function(){
    if(document.getElementById('jPayTypeSplit').checked && currentSplitMode()==='per_video') refreshInstallmentsForMode();
  });

  if(job && job.paymentType==='split'){
    renderInstallmentsPreview();
  }

  function close(){ document.getElementById('modalRoot').innerHTML = ''; }
  document.getElementById('jobModalClose').addEventListener('click', close);
  document.getElementById('jCancel').addEventListener('click', close);
  document.getElementById('jobOverlay').addEventListener('click', function(e){ if(e.target.id==='jobOverlay') close(); });

  if(!isNew){
    document.getElementById('jDelete').addEventListener('click', function(){
      if(confirm('Excluir este trabalho? Essa ação não pode ser desfeita.')){
        state.jobs = state.jobs.filter(function(j){return j.id!==job.id;});
        saveJobs();
        close();
        showToast('Trabalho excluído.');
        render();
      }
    });
  }

  document.getElementById('jSave').addEventListener('click', function(){
    var brandNameInput = document.getElementById('jBrand').value.trim();
    if(!brandNameInput){ showToast('Digite o nome da marca.'); document.getElementById('jBrand').focus(); return; }
    var brand = findOrCreateBrandByName(brandNameInput);
    var brandId = brand.id;
    var title = document.getElementById('jTitle').value.trim();
    var videos = document.getElementById('jVideos').value;
    var photos = document.getElementById('jPhotos').value;
    var stories = document.getElementById('jStories').value;

    // Coleta o estado dos checks de vídeos produzidos (se existirem no modal)
    var videosDone = (!isNew && job.videosDone) ? Object.assign({}, job.videosDone) : {};
    document.querySelectorAll('[data-video-check]').forEach(function(cb){
      videosDone[cb.getAttribute('data-video-check')] = cb.checked;
    });

    var isSplit = document.getElementById('jPayTypeSplit').checked;
    var splitMode = isSplit ? currentSplitMode() : null;
    var data = {
      title: title,
      brandId: brandId,
      platformId: document.getElementById('jPlatform').value,
      status: document.getElementById('jStatus').value,
      contentType: document.getElementById('jContentType').value,
      videoCount: videos===''?null:parseInt(videos,10),
      photoCount: photos===''?null:parseInt(photos,10),
      storyCount: stories===''?null:parseInt(stories,10),
      videosDone: videosDone,
      deadline: document.getElementById('jDeadline').value,
      payDate: document.getElementById('jPayDate').value,
      paymentMethod: document.getElementById('jPaymentMethod').value,
      value: document.getElementById('jValue').value.trim(),
      currency: document.getElementById('jCurrency').value,
      paymentType: isSplit ? 'split' : 'single',
      splitMode: splitMode,
      installments: isSplit ? workingInstallments : [],
      notes: document.getElementById('jNotes').value.trim()
    };
    if(!data.title){
      var b = brandById(data.brandId);
      data.title = b ? b.name : 'Trabalho sem título';
    }
    if(isNew){
      data.id = uid();
      data.createdAt = Date.now();
      state.jobs.push(data);
      showToast('Trabalho criado.');
    } else {
      Object.assign(job, data);
      showToast('Alterações salvas.');
    }
    var btn = document.getElementById('jSave');
    btn.disabled = true;
    saveJobs().then(function(){
      close();
      render();
    }).catch(function(){
      btn.disabled = false;
    });
  });
}

/* ---------------- render: products ---------------- */
var PRODUCT_STATUS_FLOW = [
  {key:"aguardando", label:"Aguardando envio"},
  {key:"transito", label:"Em trânsito"},
  {key:"recebido", label:"Recebido"}
];
var PRODUCT_STATUS_COLORS = {
  aguardando: {dot:'var(--amber)', bg:'var(--amber-tint)', fg:'var(--amber-deep)'},
  transito:   {dot:'var(--plum)',  bg:'var(--plum-tint)',  fg:'var(--plum)'},
  recebido:   {dot:'var(--sage)',  bg:'var(--sage-tint)',  fg:'var(--sage-deep)'}
};

function renderProducts(){
  var html = '';
  html += '<div class="page-head"><div><h1>Produtos</h1><p class="page-sub">Itens físicos enviados pelas marcas para produção do conteúdo.</p></div>' +
    '<button class="btn btn-primary" id="btnNewProduct"><span>+</span> Novo produto</button></div>';

  if(state.products.length===0){
    html += emptyState("Nenhum produto cadastrado ainda. Registre quando uma marca enviar algo para você produzir.", "btnEmptyNewProduct", "+ Adicionar produto");
    document.getElementById('pageContent').innerHTML = html;
    document.getElementById('btnNewProduct').addEventListener('click', function(){ openProductModal(null); });
    document.getElementById('btnEmptyNewProduct').addEventListener('click', function(){ openProductModal(null); });
    return;
  }

  html += '<div class="kanban" id="productsKanban" style="height:auto; min-height:280px;"></div>';
  document.getElementById('pageContent').innerHTML = html;
  document.getElementById('btnNewProduct').addEventListener('click', function(){ openProductModal(null); });
  renderProductsKanban();
}

function renderProductsKanban(){
  var wrap = document.getElementById('productsKanban');
  var html = '';
  PRODUCT_STATUS_FLOW.forEach(function(s){
    var items = state.products.filter(function(p){ return p.status===s.key; });
    var c = PRODUCT_STATUS_COLORS[s.key];
    html += '<div class="kanban-col">' +
      '<div class="kanban-col-head"><span class="status-badge" style="background:'+c.bg+'; color:'+c.fg+';"><span class="status-dot" style="background:'+c.dot+';"></span>'+escapeHtml(s.label)+'</span><span class="kanban-col-count">('+items.length+')</span></div>' +
      '<div class="kanban-col-body" data-product-col="'+s.key+'">';
    items.forEach(function(p){ html += productCardHtml(p); });
    html += '<button class="kanban-add" data-new-product-status="'+s.key+'">+ Adicionar</button>';
    html += '</div></div>';
  });
  wrap.innerHTML = html;

  wrap.querySelectorAll('.kanban-card').forEach(function(card){
    card.addEventListener('click', function(){
      if(card.classList.contains('dragging')) return;
      openProductModal(card.getAttribute('data-product-id'));
    });
    card.addEventListener('dragstart', function(e){
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.getAttribute('data-product-id'));
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function(){ card.classList.remove('dragging'); });
  });
  wrap.querySelectorAll('[data-new-product-status]').forEach(function(btn){
    btn.addEventListener('click', function(){ openProductModal(null, btn.getAttribute('data-new-product-status')); });
  });
  wrap.querySelectorAll('[data-product-col]').forEach(function(col){
    col.addEventListener('dragover', function(e){ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', function(){ col.classList.remove('drag-over'); });
    col.addEventListener('drop', function(e){
      e.preventDefault();
      col.classList.remove('drag-over');
      var pId = e.dataTransfer.getData('text/plain');
      var newStatus = col.getAttribute('data-product-col');
      var prod = state.products.find(function(x){ return x.id===pId; });
      if(prod && prod.status!==newStatus){
        prod.status = newStatus;
        if(newStatus==='recebido' && !prod.receivedDate) prod.receivedDate = isoDate(new Date());
        saveProducts();
        showToast('Movido para "'+(PRODUCT_STATUS_FLOW.find(function(s){return s.key===newStatus;})||{}).label+'".');
        renderProductsKanban();
      }
    });
  });
}

function productCardHtml(p){
  var brand = brandById(p.brandId);
  var d = p.expectedDate ? daysUntil(p.expectedDate) : null;
  var dateText = null;
  if(p.status==='recebido' && p.receivedDate){
    dateText = 'recebido em ' + fmtDate(p.receivedDate);
  } else if(d!==null){
    dateText = d<0 ? Math.abs(d)+'d de atraso' : d===0 ? 'chega hoje' : d===1 ? 'chega amanhã' : 'chega em '+d+'d';
  }
  return '<div class="kanban-card" draggable="true" data-product-id="'+p.id+'" tabindex="0" role="button" aria-label="Abrir '+escapeHtml(p.name)+'">' +
    '<p class="kanban-card-title">'+escapeHtml(p.name)+'</p>' +
    '<div class="kanban-tags">' +
      (brand ? '<span class="tag" style="background:var(--magenta-tint); color:var(--magenta-deep);">'+escapeHtml(brand.name)+'</span>' : '') +
    '</div>' +
    (dateText ? '<div style="margin-top:8px;"><span class="tag tag-deadline" style="'+(p.status==='recebido'?'background:var(--sage-tint); color:var(--sage-deep);':'')+'">'+escapeHtml(dateText)+'</span></div>' : '') +
  '</div>';
}

function openProductModal(productId, presetStatus){
  var product = productId ? state.products.find(function(p){return p.id===productId;}) : null;
  var isNew = !product;

  var brandDatalistOptions = state.brands.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(b){
    return '<option value="'+escapeHtml(b.name)+'"></option>';
  }).join('');
  var currentBrand = product ? brandById(product.brandId) : null;

  var jobOptions = '<option value="">— nenhum —</option>' + state.jobs
    .filter(function(j){ return !product || !currentBrand || j.brandId===currentBrand.id || true; })
    .slice().sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); })
    .map(function(j){
      var b = brandById(j.brandId);
      var label = (b?b.name+' — ':'') + (j.title||'sem título');
      return '<option value="'+j.id+'" '+(product&&product.jobId===j.id?'selected':'')+'>'+escapeHtml(label)+'</option>';
    }).join('');

  var statusOptions = PRODUCT_STATUS_FLOW.map(function(s){
    return '<option value="'+s.key+'" '+((product?product.status:presetStatus)===s.key?'selected':'')+'>'+escapeHtml(s.label)+'</option>';
  }).join('');

  var modalHtml =
    '<div class="overlay" id="prodOverlay">' +
      '<div class="modal" role="dialog" aria-modal="true" aria-labelledby="prodModalTitle">' +
        '<div class="modal-head"><h2 id="prodModalTitle">'+(isNew?'Novo produto':'Editar produto')+'</h2>' +
          '<button class="modal-close" id="prodModalClose" aria-label="Fechar">✕</button></div>' +
        '<div class="field"><label for="prName">Nome do produto</label>' +
          '<input id="prName" type="text" placeholder="Ex: Kit skincare, fone bluetooth..." value="'+escapeHtml(product?product.name:'')+'" /></div>' +
        '<div class="field"><label for="prBrand">Marca *</label>' +
          '<input id="prBrand" type="text" list="prBrandList" placeholder="Digite o nome — se for nova, criamos pra você" value="'+escapeHtml(currentBrand?currentBrand.name:'')+'" autocomplete="off" />' +
          '<datalist id="prBrandList">'+brandDatalistOptions+'</datalist></div>' +
        '<div class="field"><label for="prJob">Vincular a um trabalho</label><select id="prJob">'+jobOptions+'</select></div>' +
        '<div class="field-row">' +
          '<div class="field"><label for="prStatus">Status</label><select id="prStatus">'+statusOptions+'</select></div>' +

          '<button class="btn btn-ghost" id="prCancel">cancelar</button>' +
          '<button class="btn btn-primary" id="prSave">'+(isNew?'Criar produto':'Salvar alterações')+'</button>' +
        '</div>' +

    '</div>';

  document.getElementById('prCancel').addEventListener('click', close);
  document.getElementById('prodOverlay').addEventListener('click', function(e){ if(e.target.id==='prodOverlay') close(); });

  if(!isNew){
    document.getElementById('prDelete').addEventListener('click', function(){
      if(confirm('Excluir este produto?')){
        state.products = state.products.filter(function(p){return p.id!==product.id;});
        saveProducts();
        close();
        showToast('Produto excluído.');
        render();
      }
    });
  }

  document.getElementById('prSave').addEventListener('click', function(){
    var name = document.getElementById('prName').value.trim();
    var brandNameInput = document.getElementById('prBrand').value.trim();
    if(!name){ showToast('Dê um nome ao produto.'); document.getElementById('prName').focus(); return; }
    if(!brandNameInput){ showToast('Digite o nome da marca.'); document.getElementById('prBrand').focus(); return; }
    var brand = findOrCreateBrandByName(brandNameInput);
    var newStatus = document.getElementById('prStatus').value;
    var data = {
      name: name,
      brandId: brand.id,
      jobId: document.getElementById('prJob').value || null,
      status: newStatus,
      expectedDate: document.getElementById('prExpected').value,
      notes: document.getElementById('prNotes').value.trim()
    };
    if(newStatus==='recebido'){
      data.receivedDate = (product && product.receivedDate) ? product.receivedDate : isoDate(new Date());
    } else {
      data.receivedDate = (product && product.receivedDate) ? product.receivedDate : '';
    }
    if(isNew){
      data.id = uid();
      data.createdAt = Date.now();
      state.products.push(data);
      showToast('Produto criado.');
    } else {
      Object.assign(product, data);
      showToast('Alterações salvas.');

    saveProducts().then(function(){
      close();
      render();

/* ---------------- notifications: smart, derived from existing data ---------------- */
/* Each notification gets a stable id (hash of its semantic content, not a random uid)
   so "mark as read" persists correctly across reloads/devices even though nothing
   is stored permanently — the notification itself is recomputed every time. */
function notifId(parts){ return parts.join('::'); }

function buildNotifications(){
  var list = [];
  var today = new Date(); today.setHours(0,0,0,0);
  var todayIso = isoDate(today);

  // Entregas próximas / atrasadas
  state.jobs.forEach(function(j){
    if(j.status===STATUS_CANCELLED || j.status==='pago' || !j.deadline) return;
    var brand = brandById(j.brandId);
    var d = daysUntil(j.deadline);
    var name = brand ? brand.name : (j.title||'um trabalho');
    if(d!==null && d<0){
      list.push({id:notifId(['deadline-late',j.id]), icon:'⚠', text:'Entrega '+name+' está '+Math.abs(d)+'d atrasada', date:j.deadline, priority:0, jobId:j.id});
    } else if(d===0){
      list.push({id:notifId(['deadline-today',j.id]), icon:'⚠', text:'Entrega '+name+' vence hoje', date:j.deadline, priority:1, jobId:j.id});
    } else if(d!==null && d<=3){
      list.push({id:notifId(['deadline-soon',j.id]), icon:'⚠', text:'Entrega '+name+' vence em '+d+'d', date:j.deadline, priority:2, jobId:j.id});
    }
    if(j.status==='aprovacao'){
      list.push({id:notifId(['awaiting-review',j.id]), icon:'📝', text:'Trabalho '+name+' aguardando revisão', date:j.deadline||todayIso, priority:3, jobId:j.id});
    }
  });

  // Pagamentos
  getReceivableItems().forEach(function(it){
    if(it.paid || !it.date) return;
    var d = daysUntil(it.date);
    if(d===0){
      list.push({id:notifId(['pay-today',it.jobId,it.instId||'']), icon:'💰', text:'Hoje você recebe '+fmtCurrency(it.value, it.currency)+' — '+it.label, date:it.date, priority:1, jobId:it.jobId});
    } else if(d!==null && d<0){
      list.push({id:notifId(['pay-late',it.jobId,it.instId||'']), icon:'💰', text:'Pagamento atrasado: '+fmtCurrency(it.value, it.currency)+' — '+it.label, date:it.date, priority:0, jobId:it.jobId});
    }
  });

  // Produtos
  state.products.forEach(function(p){
    var brand = brandById(p.brandId);
    var name = brand ? brand.name : p.name;
    if(p.status==='recebido' && p.receivedDate===todayIso){
      list.push({id:notifId(['product-received',p.id]), icon:'📦', text:'Produto '+name+' chegou hoje', date:p.receivedDate, priority:3, productId:p.id});
    } else if(p.status!=='recebido' && p.expectedDate===todayIso){
      list.push({id:notifId(['product-today',p.id]), icon:'📦', text:'Produto '+name+' chega hoje', date:p.expectedDate, priority:2, productId:p.id});
    }
  });

  // Follow-ups pendentes (sem contato há 5+ dias em status de follow-up)
  state.prospects.forEach(function(p){
    if(p.status!=='followup1' && p.status!=='followup2' && p.status!=='enviado') return;
    var refDate = p.updatedAt || p.createdAt;
    if(!refDate) return;
    var diffDays = Math.floor((Date.now()-refDate)/86400000);
    if(diffDays>=5){
      list.push({id:notifId(['followup',p.id, String(Math.floor(diffDays/5))]), icon:'📧', text:'Faz '+diffDays+' dias desde o último contato com '+p.brandName, date:todayIso, priority:2, prospectId:p.id});
    }
  });

  // Gravações hoje
  var recordingsToday = state.jobs.filter(function(j){ return j.status==='gravacao' && j.deadline; });
  var gravToday = recordingsToday.filter(function(j){ return daysUntil(j.deadline)===0; });
  if(gravToday.length>0){
    list.push({id:notifId(['recordings-today',todayIso]), icon:'🎬', text:'Hoje você tem '+gravToday.length+(gravToday.length===1?' gravação':' gravações')+' prevista'+(gravToday.length===1?'':'s'), date:todayIso, priority:1});
  }

  // Checklist atrasado (tarefas de trabalho não feitas com data passada)
  var lateChecks = state.checklist.filter(function(c){ return !c.done && c.date && c.date<todayIso && c.category==='trabalho'; });
  if(lateChecks.length>0){
    list.push({id:notifId(['checklist-late',todayIso,String(lateChecks.length)]), icon:'✓', text:lateChecks.length===1?'1 tarefa do checklist está atrasada':lateChecks.length+' tarefas do checklist estão atrasadas', date:todayIso, priority:2});
  }

  list.sort(function(a,b){ return a.priority-b.priority || (a.date||'').localeCompare(b.date||''); });
  return list;
}

function unreadNotifications(){
  return buildNotifications().filter(function(n){ return !state.notificationsRead[n.id]; });
}

function renderNotifBell(){
  var unread = unreadNotifications();
  var count = unread.length;
  var html = '<button class="notif-bell-btn" id="notifBellBtn" aria-label="Notificações">🔔' +
    (count>0 ? '<span class="notif-badge">'+(count>9?'9+':count)+'</span>' : '') +
  '</button>';
  ['notifBellWrapDesktop','notifBellWrapMobile'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.innerHTML = html;
  });
  document.querySelectorAll('#notifBellBtn').forEach(function(btn){
    btn.addEventListener('click', function(e){ e.stopPropagation(); toggleNotifPanel(btn); });
  });
}

function toggleNotifPanel(anchorBtn){
  var root = document.getElementById('notifPanelRoot');
  if(state.notifPanelOpen){ closeNotifPanel(); return; }
  state.notifPanelOpen = true;
  var notifs = buildNotifications();
  var rect = anchorBtn.getBoundingClientRect();
  var panelTop = rect.bottom + 8;
  var panelRight = Math.max(12, window.innerWidth - rect.right);

  var html = '<div class="notif-overlay" id="notifOverlay"></div>' +
    '<div class="notif-panel" id="notifPanel" style="top:'+panelTop+'px; right:'+panelRight+'px;">' +
      '<div class="notif-panel-head"><h3>Notificações</h3>' +
        (notifs.length>0 ? '<button class="notif-mark-all" id="notifMarkAll">marcar tudo como lida</button>' : '') +
      '</div>' +
      '<div class="notif-list">' +
        (notifs.length===0 ? '<div class="notif-empty">Tudo em dia por aqui. 🌿</div>' :
          notifs.map(function(n){
            var unread = !state.notificationsRead[n.id];
            return '<div class="notif-item '+(unread?'unread':'')+'" data-notif-id="'+n.id+'" data-job-id="'+(n.jobId||'')+'" data-product-id="'+(n.productId||'')+'" data-prospect-id="'+(n.prospectId||'')+'">' +
              '<span class="notif-ico">'+n.icon+'</span>' +
              '<span class="notif-text">'+escapeHtml(n.text)+'</span>' +
              (unread ? '<span class="notif-dot-new"></span>' : '') +
            '</div>';
          }).join('')
        ) +
      '</div>' +
    '</div>';
  root.innerHTML = html;

  document.getElementById('notifOverlay').addEventListener('click', closeNotifPanel);
  var markAllBtn = document.getElementById('notifMarkAll');
  if(markAllBtn) markAllBtn.addEventListener('click', function(){
    notifs.forEach(function(n){ state.notificationsRead[n.id] = true; });
    saveNotificationsRead();
    closeNotifPanel();
    renderNotifBell();
  });
  document.querySelectorAll('.notif-item').forEach(function(item){
    item.addEventListener('click', function(){
      var id = item.getAttribute('data-notif-id');
      state.notificationsRead[id] = true;
      saveNotificationsRead();
      renderNotifBell();
      var jobId = item.getAttribute('data-job-id');
      var productId = item.getAttribute('data-product-id');
      var prospectId = item.getAttribute('data-prospect-id');
      closeNotifPanel();
      if(jobId) openJobModal(jobId);
      else if(productId) openProductModal(productId);
      else if(prospectId) openProspectModal(prospectId);
    });
  });
}

function closeNotifPanel(){
  state.notifPanelOpen = false;
  document.getElementById('notifPanelRoot').innerHTML = '';
}

/* ---------------- scroll preservation: keeps the user's position after any re-render ---------------- */
var _savedScrollY = 0;
function saveScrollY(){ _savedScrollY = window.scrollY || document.documentElement.scrollTop || 0; }
function restoreScrollY(){ if(_savedScrollY > 0) requestAnimationFrame(function(){ window.scrollTo(0, _savedScrollY); }); }

/* ---------------- main render dispatcher ---------------- */
function render(){
  if(!state.loaded){
    document.getElementById('pageContent').innerHTML = '<p style="color:var(--ink-faint);">Carregando seus dados...</p>';
    return;
  }
  saveScrollY();
  renderNotifBell();
  if(state.route==='dashboard') renderDashboard();
  else if(state.route==='prospects') renderProspects();
  else if(state.route==='jobs') renderJobs();
  else if(state.route==='products') renderProducts();
  else if(state.route==='agenda') renderAgenda();
  else if(state.route==='checklist') renderChecklist();
  else if(state.route==='brands') renderBrands();
  else if(state.route==='platforms') renderPlatforms();
  else if(state.route==='payments') renderPayments();
  else if(state.route==='metrics') renderMetrics();
  else if(state.route==='contracts') renderContracts();
  restoreScrollY();
}

function generateContractPdf(){
  var prof = state.contractProfile;
  if(!prof){ showToast('Cadastre seus dados primeiro.'); return; }
  if(typeof window.jspdf === 'undefined'){ showToast('Não foi possível carregar o gerador de PDF.'); return; }

  var brandName = document.getElementById('cBrandName').value.trim();
  var brandDoc = document.getElementById('cBrandDoc').value.trim();
  var brandAddress = document.getElementById('cBrandAddress').value.trim();
  var videos = document.getElementById('cVideos').value || '0';
  var photos = document.getElementById('cPhotos').value || '0';
  var deadlineDays = document.getElementById('cDeadlineDays').value || '5';
  var value = document.getElementById('cValue').value.trim();
  var dateStr = document.getElementById('cDate').value;
  var city = document.getElementById('cCity').value.trim() || prof.city || '';

  if(!brandName){ showToast('Informe o nome da marca contratante.'); return; }

  var valueNum = parseMoneyGuess(value);
  var half = (valueNum/2).toFixed(2).replace('.',',');
  var dateLabel = dateStr ? new Date(dateStr+"T00:00:00").toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}) : '';

  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({unit:'pt', format:'a4'});
  var pageWidth = doc.internal.pageSize.getWidth();
  var margin = 56;
  var maxWidth = pageWidth - margin*2;
  var y = 64;
  var lineHeight = 15;

  function addParagraph(text, opts){
    opts = opts || {};
    doc.setFont('helvetica', opts.bold ? 'bold' : 'normal');
    doc.setFontSize(opts.size || 10.5);
    var lines = doc.splitTextToSize(text, maxWidth);
    lines.forEach(function(line){
      if(y > 770){ doc.addPage(); y = 64; }
      doc.text(line, margin, y);
      y += lineHeight;
    });
    y += opts.spacingAfter!=null ? opts.spacingAfter : 8;
  }
  function addHeading(text){
    if(y > 740){ doc.addPage(); y = 64; }
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text(text, margin, y);
    y += lineHeight + 4;
  }

  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.text('CONTRATO DE PRESTAÇÃO DE SERVIÇOS UGC', pageWidth/2, y, {align:'center'});
  y += 28;

  addHeading('IDENTIFICAÇÃO DAS PARTES');
  addParagraph('CONTRATANTE: ' + brandName + (brandDoc ? ', pessoa jurídica/física inscrita no CNPJ/CPF nº ' + brandDoc : '') + (brandAddress ? ', com sede/endereço em ' + brandAddress + '.' : '.') + ' Neste ato representada por seu representante legal.');
  addParagraph('CONTRATADA: ' + prof.name + (prof.nationality ? ', ' + prof.nationality : '') + (prof.maritalStatus ? ', ' + prof.maritalStatus : '') + ', Creator UGC, portadora do CNPJ/CPF nº ' + (prof.document||'—') + (prof.address ? ', residente e domiciliada em ' + prof.address + '.' : '.'));
  addParagraph('Têm, entre si, justo e contratado o que segue:', {spacingAfter:14});

  addHeading('CLÁUSULA PRIMEIRA – DO OBJETO');
  addParagraph('1.1. O presente contrato tem por objeto a prestação de serviços de criação de conteúdo digital no formato UGC (User Generated Content) pela CONTRATADA à CONTRATANTE.');
  addParagraph('1.2. O pacote contratado inclui a entrega de:');
  addParagraph('• ' + videos + ' vídeo(s) em formato vertical (9:16)');
  addParagraph('• ' + photos + ' foto(s)');
  addParagraph('• Roteirização, captação e edição do material.', {spacingAfter:14});

  addHeading('CLÁUSULA SEGUNDA – DO CRONOGRAMA E LOGÍSTICA');
  addParagraph('2.1. O prazo de entrega do material será de ' + deadlineDays + ' dias úteis, contados a partir da data de recebimento dos produtos pela CONTRATADA.');
  addParagraph('2.2. A CONTRATANTE compromete-se a fornecer os produtos necessários para a produção, arcando integralmente com os custos de envio (frete).');
  addParagraph('2.3. Os produtos enviados para a produção do conteúdo não serão devolvidos, caracterizando-se como bonificação e material de trabalho, salvo acordo prévio por escrito estipulando a logística reversa (também custeada pela CONTRATANTE).', {spacingAfter:14});

  addHeading('CLÁUSULA TERCEIRA – DA APROVAÇÃO E AJUSTES (REFAÇÃO)');
  addParagraph('3.1. A CONTRATADA enviará uma versão prévia do vídeo com uma MARCA D\'ÁGUA para aprovação.');
  addParagraph('3.2. A CONTRATANTE terá o prazo de 3 (três) dias úteis para solicitar ajustes ou aprovar o material.');
  addParagraph('3.3. Do Silêncio (Aprovação Tácita): A ausência de resposta da CONTRATANTE após o prazo de 3 dias úteis implicará na aprovação automática do material, autorizando a cobrança do valor final.');
  addParagraph('3.4. Das Revisões: O valor contratado dá direito a 1 (uma) rodada de ajustes simples (ex: cortes, volume de música, alteração de legenda), desde que estejam dentro do roteiro aprovado previamente.');
  addParagraph('3.5. Refação Extra: Caso a CONTRATANTE solicite alterações que fujam do briefing inicial aprovado, ou que exijam regravação completa por mudança de estratégia da marca, será cobrada uma taxa adicional de 50% do valor do vídeo por alteração.', {spacingAfter:14});

  addHeading('CLÁUSULA QUARTA – DO VALOR E PAGAMENTO');
  addParagraph('4.1. Pela prestação dos serviços, a CONTRATANTE pagará à CONTRATADA o valor total de R$ ' + (value||'—') + '.');
  addParagraph('4.2. O pagamento será realizado da seguinte forma:');
  addParagraph('• 50% (Sinal): R$ ' + half + ' no ato da assinatura deste contrato (para garantir a vaga na agenda e início do roteiro).');
  addParagraph('• 50% (Final): R$ ' + half + ' após a aprovação do vídeo com marca d\'água e ANTES do envio do arquivo final em alta resolução.');
  addParagraph('4.3. O pagamento deverá ser feito via PIX para a Chave: ' + (prof.pixKey||'—') + '.');
  addParagraph('4.4. O atraso no pagamento do valor final acarretará multa de 2% e juros de 1% ao mês, além da suspensão do direito de uso da imagem até a regularização.', {spacingAfter:14});

  addHeading('CLÁUSULA QUINTA – DOS DIREITOS DE USO E IMAGEM');
  addParagraph('5.1. Uso Orgânico: A CONTRATANTE poderá utilizar o conteúdo em suas redes sociais oficiais e site por prazo indeterminado.');
  addParagraph('5.2. Uso em Tráfego Pago (Ads): O uso do conteúdo para anúncios patrocinados (Dark Posts, Spark Ads) é autorizado pelo período de 4 meses a contar da entrega. Após este período, a renovação deverá ser negociada à parte.');
  addParagraph('5.3. Proteção contra IA: Fica expressamente PROIBIDO o uso da voz ou imagem da CONTRATADA para treinamento de Inteligência Artificial, criação de avatares digitais ou "deepfakes".');
  addParagraph('5.4. A CONTRATADA não autoriza o uso de sua imagem em contextos difamatórios, ilícitos ou que firam a moral e os bons costumes.', {spacingAfter:14});

  addHeading('CLÁUSULA SEXTA – DA RESCISÃO E MULTA');
  addParagraph('6.1. Em caso de desistência por parte da CONTRATANTE após o pagamento do sinal e início do roteiro/produção, o valor de 50% (sinal) não será devolvido, servindo como remuneração pelas horas já trabalhadas e reserva de agenda.');
  addParagraph('6.2. Este contrato poderá ser rescindido por ambas as partes mediante aviso prévio, respeitando os direitos adquiridos e trabalhos já executados.', {spacingAfter:14});

  addHeading('CLÁUSULA SÉTIMA – DO FORO');
  addParagraph('7.1. Para dirimir quaisquer controvérsias oriundas do CONTRATO, as partes elegem o foro da comarca de ' + (prof.forum||'—') + '.', {spacingAfter:18});

  addParagraph('E, por estarem assim justos e contratados, assinam o presente instrumento (sendo válida a assinatura eletrônica ou o aceite formal via e-mail/WhatsApp).', {spacingAfter:18});
  addParagraph((city||'—') + ', ' + (dateLabel||'—') + '.', {spacingAfter:36});

  if(y > 700){ doc.addPage(); y = 64; }
  doc.setFont('helvetica','normal');
  doc.setFontSize(10.5);
  doc.text('_______________________________', margin, y);
  doc.text('_______________________________', pageWidth/2 + 20, y);
  y += 16;
  doc.text('CONTRATANTE', margin, y);
  doc.text('CONTRATADA (Creator)', pageWidth/2 + 20, y);

  var fileName = 'contrato-' + brandName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') + '.pdf';
  doc.save(fileName);
  showToast('Contrato gerado e baixado.');
}
